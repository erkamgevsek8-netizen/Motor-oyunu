<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: Arial; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        #c { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #dashboard { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 12px 18px; display: flex; align-items: center; gap: 15px; z-index: 10; pointer-events: none; }
        #speed-val { font-size: 38px; font-weight: 900; color: #ff4d00; line-height: 1; }
        #speed-unit { font-size: 10px; color: #aaa; }
        #gear-val { background: rgba(255,215,0,0.15); border: 2px solid rgba(255,215,0,0.4); border-radius: 10px; padding: 5px 10px; font-size: 20px; font-weight: 900; color: #ffd700; }
        #rpm-bar { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #rpm-fill { height: 100%; width: 0%; border-radius: 4px; }
        #rpm-txt { font-size: 8px; color: #aaa; text-align: right; }
        #money-hud { position: fixed; top: 15px; right: 15px; z-index: 10; background: rgba(0,0,0,0.75); border: 2px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 6px 14px; font-size: 14px; color: #ffd700; pointer-events: none; }
        #dist-hud { position: fixed; top: 55px; right: 15px; z-index: 10; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 4px 10px; font-size: 10px; color: #aaa; pointer-events: none; }
        #back { position: fixed; top: 12px; left: 12px; z-index: 20; background: rgba(0,0,0,0.7); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 18px; }
        #cam-btn { position: fixed; top: 12px; left: 65px; z-index: 20; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 8px 12px; font-size: 11px; color: #fff; cursor: pointer; }
        #btns { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 35px; }
        #btns button { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); font-size: 26px; color: #fff; cursor: pointer; pointer-events: all; }
        #gas-btn { background: rgba(0,180,0,0.4); border-color: #0f0; width: 70px; height: 70px; font-size: 30px; }
        #brake-btn { background: rgba(180,0,0,0.4); border-color: #f00; }
        #wheelie-btn { position: fixed; right: 15px; bottom: 180px; z-index: 10; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,215,0,0.2); border: 2px solid rgba(255,215,0,0.4); font-size: 18px; color: #ffd700; cursor: pointer; pointer-events: all; }
        #horn-btn { position: fixed; left: 15px; bottom: 180px; z-index: 10; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,0,0.2); border: 2px solid rgba(255,255,0,0.4); font-size: 18px; color: #ff0; cursor: pointer; pointer-events: all; }
        .pc-mode #btns, .pc-mode #wheelie-btn, .pc-mode #horn-btn { display: none !important; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <a href="index.html" id="back">←</a>
    <div id="cam-btn" onclick="switchCam()">📷 <span id="cam-label">ARKA</span></div>
    <div id="dashboard">
        <div><span id="speed-val">0</span><br><span id="speed-unit">KM/H</span></div>
        <span id="gear-val">N</span>
        <div><div id="rpm-bar"><div id="rpm-fill"></div></div><div id="rpm-txt">0 RPM</div></div>
    </div>
    <div id="money-hud">🪙 <span id="money-val">0</span></div>
    <div id="dist-hud">📏 <span id="dist-val">0</span> m</div>
    <div id="btns">
        <button id="brake-btn">🔽</button>
        <button id="gas-btn">🔼</button>
    </div>
    <button id="wheelie-btn">⬆️</button>
    <button id="horn-btn">📢</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
    window.onload = function() {
        if (typeof THREE === 'undefined') { document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Yuklenemedi!</h1>'; return; }

        var settings, bikeColor;
        try { settings = JSON.parse(localStorage.getItem('motorRiderSettings')) || { mode: 'phone', sensitivity: 65, drawDistance: 100 }; } catch(e) { settings = { mode: 'phone', sensitivity: 65, drawDistance: 100 }; }
        try { bikeColor = localStorage.getItem('motorRiderBikeColor') || '#ff3300'; } catch(e) { bikeColor = '#ff3300'; }
        if (settings.mode === 'pc') document.body.classList.add('pc-mode');

        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        var fogDist = 30 + (settings.drawDistance / 100) * 90;
        scene.fog = new THREE.Fog(0x87CEEB, fogDist * 0.5, fogDist);

        var camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.3, fogDist + 30);
        var camMode = 1;
        camera.position.set(0, 3.5, -6);

        var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        var sun = new THREE.DirectionalLight(0xfff8e7, 2);
        sun.position.set(30, 40, 20); scene.add(sun);

        // ============ SES (TEK EGZOZ PATLATMA) ============
        var audioCtx = null;
        function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }

        function playExhaustPop() {
            initAudio(); if (!audioCtx) return;
            try {
                var now = audioCtx.currentTime;
                var sr = audioCtx.sampleRate;
                var buf = audioCtx.createBuffer(1, 0.4 * sr, sr);
                var d = buf.getChannelData(0);
                for (var i = 0; i < d.length; i++) {
                    d[i] = ((Math.random() * 2 - 1) * 0.4 + Math.sin(2 * Math.PI * 60 * (i/sr)) * 0.6) * Math.exp(-i/sr * 8) * 0.7;
                }
                var src = audioCtx.createBufferSource(); src.buffer = buf;
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0.6, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                src.connect(g); g.connect(audioCtx.destination); src.start();
            } catch(e) {}
        }

        function playHorn() {
            initAudio(); if (!audioCtx) return;
            try {
                var o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'square'; o.frequency.value = 440;
                g.gain.setValueAtTime(0.25, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.35);
            } catch(e) {}
        }

        // ============ MOTOR ============
        var bike = new THREE.Group();
        var chrome = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 1 });
        var tire = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        var seatMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        var dark = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.3, metalness: 0.7 });
        var bodyMat = new THREE.MeshStandardMaterial({ color: bikeColor, roughness: 0.15, metalness: 0.8 });

        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 1.7), bodyMat).position.set(0, 0.65, 0));
        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.5), dark).position.set(0, 0.5, -0.05));
        var tank = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.23, 0.65, 12), bodyMat);
        tank.rotation.x = Math.PI/2; tank.position.set(0, 0.9, 0.25); bike.add(tank);
        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.12, 0.55), seatMat).position.set(0, 0.92, -0.45));
        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 12), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.8 })).rotation.set(Math.PI/2,0,0).position.set(0, 0.85, 1.0));

        var fw = new THREE.Group(); fw.position.set(0, 0.15, 0.9);
        var ft = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 16), tire); fw.add(ft);
        fw.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 16), chrome).rotation.set(Math.PI/2,0,0)); bike.add(fw);

        var rw = new THREE.Group(); rw.position.set(0, 0.15, -0.75);
        var rt = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 16), tire); rw.add(rt);
        rw.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 16), chrome).rotation.set(Math.PI/2,0,0)); bike.add(rw);

        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.65, 8), chrome).rotation.set(0,0,Math.PI/2).position.set(0, 1.2, 0.8));

        // Basit egzoz
        var exGroup = new THREE.Group();
        exGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.9, 8), chrome).position.set(0.2, 0.25, -0.5).rotation.set(-0.2,0,0));
        exGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.09, 0.45), chrome).position.set(0.2, 0.06, -1.0));
        var exTip = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.1, 8), new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.1, metalness: 1, emissive: 0x220000, emissiveIntensity: 0.3 }));
        exTip.position.set(0.2, 0.06, -1.25);
        exGroup.add(exTip);
        bike.add(exGroup);

        // Alev
        var flameGroup = new THREE.Group(); flameGroup.visible = false; bike.add(flameGroup);
        var flames = [];
        function burstFlame() {
            while(flameGroup.children.length>0) flameGroup.remove(flameGroup.children[0]);
            flames = [];
            for (var i=0; i<20; i++) {
                var fl = new THREE.Mesh(new THREE.SphereGeometry(Math.random()*0.05+0.02, 3, 3), new THREE.MeshBasicMaterial({ color: Math.random()>0.5 ? 0xff4400 : 0xffaa00, transparent: true }));
                fl.position.set(0.2+(Math.random()-0.5)*0.1, 0.06, -1.3);
                flames.push({ mesh: fl, vel: new THREE.Vector3((Math.random()-0.5)*2, Math.random()*3+0.5, -Math.random()*5-2), life: 0.4+Math.random()*0.3, age: 0 });
                flameGroup.add(fl);
            }
            flameGroup.visible = true;
        }
        function updateFlames(dt) {
            for (var i=flames.length-1; i>=0; i--) {
                var p = flames[i]; p.age += dt;
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.mesh.material.opacity = 1 - (p.age/p.life);
                if (p.age >= p.life) { flameGroup.remove(p.mesh); flames.splice(i,1); }
            }
            if (flames.length===0) flameGroup.visible = false;
        }
        scene.add(bike);

        // ============ YOL + BİNALAR ============
        var roadGroup = new THREE.Group(); scene.add(roadGroup);
        var roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        var grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
        var bMats = [
            new THREE.MeshStandardMaterial({ color: 0xc4a882, roughness: 0.6 }),
            new THREE.MeshStandardMaterial({ color: 0xd5c4a1, roughness: 0.5 }),
            new THREE.MeshStandardMaterial({ color: 0xb8c5d0, roughness: 0.4, metalness: 0.3 })
        ];
        var segments = [];
        var SEG = 28, COUNT = 5;

        function createSegment(zPos) {
            var g = new THREE.Group();
            var road = new THREE.Mesh(new THREE.PlaneGeometry(8, SEG), roadMat);
            road.rotation.x = -Math.PI/2; road.position.set(0, 0.01, SEG/2); g.add(road);
            for (var z=0; z<SEG; z+=4) {
                var dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                dash.rotation.x = -Math.PI/2; dash.position.set(0, 0.02, z+2); g.add(dash);
            }
            for (var s=-1; s<=1; s+=2) {
                var edge = new THREE.Mesh(new THREE.PlaneGeometry(0.2, SEG), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                edge.rotation.x = -Math.PI/2; edge.position.set(s*3.5, 0.02, SEG/2); g.add(edge);
                var grass = new THREE.Mesh(new THREE.PlaneGeometry(12, SEG), grassMat);
                grass.rotation.x = -Math.PI/2; grass.position.set(s*10, -0.02, SEG/2); g.add(grass);

                // Ağaçlar
                for (var t=0; t<2; t++) {
                    var tree = new THREE.Group();
                    var th = 2+Math.random()*2;
                    tree.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, th, 5), new THREE.MeshStandardMaterial({ color: 0x8B5E3C })).position.set(0, th/2, 0));
                    tree.add(new THREE.Mesh(new THREE.ConeGeometry(1, 3, 6), new THREE.MeshStandardMaterial({ color: 0x1a5c1a })).position.set(0, th+1, 0));
                    tree.position.set(s*(7+Math.random()*6), 0, Math.random()*SEG); g.add(tree);
                }

                // Binalar (penceresiz, basit)
                if (Math.random() > 0.4) {
                    var bw = 3+Math.random()*5, bh = 5+Math.random()*20, bd = 3+Math.random()*6;
                    var b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bMats[Math.floor(Math.random()*3)]);
                    b.position.set(s*(8+bw/2+Math.random()*3), bh/2, Math.random()*(SEG-bd));
                    b.castShadow = true; g.add(b);
                }
            }
            g.position.z = zPos; return g;
        }

        for (var i=0; i<COUNT; i++) { var seg = createSegment(-i*SEG); segments.push(seg); roadGroup.add(seg); }

        // ============ OYUN ============
        var speed = 0, gear = 0, rpm = 0;
        var money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        var dist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        var saveCounter = 0, lastExhaust = 0;
        var lateralPos = 0, leanAngle = 0, wheelieAngle = 0;
        var gasOn = false, brakeOn = false, wheelieOn = false;
        var keys = {};
        var gears = [0, 30, 55, 85, 120, 155, 200];

        document.getElementById('gas-btn').addEventListener('touchstart', function(e) { e.preventDefault(); gasOn = true; initAudio(); });
        document.getElementById('gas-btn').addEventListener('touchend', function() { gasOn = false; });
        document.getElementById('brake-btn').addEventListener('touchstart', function(e) { e.preventDefault(); brakeOn = true; });
        document.getElementById('brake-btn').addEventListener('touchend', function() { brakeOn = false; });
        document.getElementById('wheelie-btn').addEventListener('touchstart', function(e) { e.preventDefault(); wheelieOn = true; });
        document.getElementById('wheelie-btn').addEventListener('touchend', function() { wheelieOn = false; });
        document.getElementById('horn-btn').addEventListener('touchstart', function(e) { e.preventDefault(); playHorn(); });

        window.addEventListener('keydown', function(e) { keys[e.key.toLowerCase()] = true; if (keys['h']) playHorn(); initAudio(); });
        window.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

        function getInput() {
            return {
                gas: gasOn || keys['w'] || keys['arrowup'] || false,
                brake: brakeOn || keys['s'] || keys['arrowdown'] || false,
                wheelie: wheelieOn || keys['shift'] || false,
                left: keys['a'] || keys['arrowleft'] || false,
                right: keys['d'] || keys['arrowright'] || false
            };
        }

        window.switchCam = function() {
            camMode = camMode === 1 ? 2 : (camMode === 2 ? 3 : 1);
            document.getElementById('cam-label').textContent = {1:'ARKA', 2:'ON', 3:'UST'}[camMode];
        };

        function updateHUD() {
            document.getElementById('speed-val').textContent = Math.floor(Math.abs(speed));
            document.getElementById('gear-val').textContent = speed < -0.5 ? 'R' : (gear === 0 ? 'N' : gear);
            document.getElementById('money-val').textContent = Math.floor(money).toLocaleString('tr-TR');
            document.getElementById('dist-val').textContent = Math.floor(dist);
            var rf = document.getElementById('rpm-fill');
            rf.style.width = (rpm * 100) + '%';
            document.getElementById('rpm-txt').textContent = Math.floor(rpm * 10000) + ' RPM';
            rf.style.background = rpm > 0.9 ? '#ff0000' : rpm > 0.7 ? '#ffd700' : '#00ff88';
        }

        function save() { try { localStorage.setItem('motorRiderMoney', Math.floor(money)); localStorage.setItem('motorRiderDistance', dist); } catch(e) {} }

        function updatePhysics(dt) {
            var input = getInput();
            if (input.gas) { if (speed < 0) speed += 50*dt; else speed += 40*(settings.sensitivity/100)*dt; }
            if (input.brake) { if (speed > 0) speed -= 70*dt; else if (speed > -35) speed -= 30*dt; }
            if (!input.gas && !input.brake) { if (speed > 0) speed -= 1*dt; else if (speed < 0) speed += 1*dt; }
            speed = Math.max(-35, Math.min(200, speed));
            if (Math.abs(speed) < 0.2) speed = 0;

            if (speed <= 0) gear = 0;
            else for (var g=6; g>=1; g--) if (speed >= gears[g-1]) { gear = g; break; }

            var absSpd = Math.abs(speed);
            rpm = gear === 0 ? (input.gas ? 0.25 : 0.05) : 0.15 + ((absSpd - gears[gear-1]) / (gears[gear] - gears[gear-1])) * 0.85;
            rpm = Math.max(0, Math.min(1, rpm));

            if (input.wheelie && speed > 20) wheelieAngle += 50*dt;
            else wheelieAngle *= 0.85;
            wheelieAngle = Math.max(0, Math.min(45, wheelieAngle));

            if (input.left) { lateralPos -= 7*dt; leanAngle = Math.max(-30, leanAngle-60*dt); }
            else if (input.right) { lateralPos += 7*dt; leanAngle = Math.min(30, leanAngle+60*dt); }
            else { leanAngle *= 0.85; }
            lateralPos = Math.max(-3.5, Math.min(3.5, lateralPos));

            var d = (Math.abs(speed)/3.6)*dt;
            dist += d; saveCounter += d;
            money += d * 0.05;
            if (saveCounter > 50) { save(); saveCounter = 0; }

            // Tek egzoz patlatma
            if (rpm > 0.5 && Math.abs(speed) > 30 && performance.now() - lastExhaust > 400) {
                playExhaustPop();
                lastExhaust = performance.now();
                burstFlame();
            }
        }

        var lastTime = performance.now();
        function loop() {
            requestAnimationFrame(loop);
            var now = performance.now();
            var dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            updatePhysics(dt); updateHUD(); updateFlames(dt);

            var move = speed * dt * 0.5;
            for (var i=0; i<segments.length; i++) {
                segments[i].position.z += move;
                if (segments[i].position.z > SEG) segments[i].position.z -= COUNT * SEG;
                if (segments[i].position.z < -COUNT * SEG) segments[i].position.z += COUNT * SEG;
            }

            bike.position.x = lateralPos;
            bike.rotation.x = -wheelieAngle * (Math.PI/180);
            bike.rotation.z = -leanAngle * (Math.PI/180);
            bike.position.y = wheelieAngle * 0.015;

            var wr = speed * dt * 0.5;
            ft.rotation.x += wr;
            rt.rotation.x += wr;

            if (camMode === 1) {
                camera.position.lerp(new THREE.Vector3(lateralPos*0.3, 3+Math.abs(speed)*0.01, -5-Math.abs(speed)*0.02), 3*dt);
                camera.lookAt(lateralPos*0.3, 1, 15);
            } else if (camMode === 2) {
                camera.position.lerp(new THREE.Vector3(lateralPos*0.2, 1.6, 1.5), 3*dt);
                camera.lookAt(lateralPos*0.2, 1.2, -3);
            } else {
                camera.position.lerp(new THREE.Vector3(lateralPos*0.2, 12, 3), 3*dt);
                camera.lookAt(lateralPos*0.2, 0, 10);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', function() {
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
        window.addEventListener('beforeunload', save);
        setInterval(save, 5000);

        updateHUD();
        lastTime = performance.now();
        loop();
    };
    </script>
</body>
</html>
