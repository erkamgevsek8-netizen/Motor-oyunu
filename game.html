<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: Arial; }
        #c { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #speed { position: fixed; bottom: 30px; left: 20px; z-index: 10; font-size: 50px; font-weight: 900; color: #ff4d00; }
        #gear { position: fixed; bottom: 35px; left: 120px; z-index: 10; font-size: 30px; font-weight: 900; color: #ffd700; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; }
        #rpm-outer { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 10; width: 150px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #rpm-inner { height: 100%; width: 0%; border-radius: 4px; background: #00ff88; }
        #money { position: fixed; top: 20px; right: 20px; z-index: 10; font-size: 16px; background: rgba(0,0,0,0.7); padding: 6px 14px; border-radius: 20px; color: #ffd700; }
        #back { position: fixed; top: 15px; left: 15px; z-index: 20; background: rgba(0,0,0,0.7); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 20px; }
        #btns { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 30px; }
        #btns button { width: 65px; height: 65px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); font-size: 28px; color: #fff; cursor: pointer; }
        #gas-btn { background: rgba(0,180,0,0.4); border-color: #0f0; }
        #brake-btn { background: rgba(180,0,0,0.4); border-color: #f00; }
        #wheelie-btn { position: fixed; right: 20px; bottom: 120px; z-index: 10; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,215,0,0.2); border: 2px solid rgba(255,215,0,0.4); font-size: 20px; color: #ffd700; cursor: pointer; }
        #horn-btn { position: fixed; left: 20px; bottom: 120px; z-index: 10; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,0,0.2); border: 2px solid rgba(255,255,0,0.4); font-size: 20px; color: #ff0; cursor: pointer; }
        .pc-mode #btns, .pc-mode #wheelie-btn, .pc-mode #horn-btn { display: none !important; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <a href="index.html" id="back">←</a>
    <div id="speed">0</div>
    <div id="gear">N</div>
    <div id="rpm-outer"><div id="rpm-inner"></div></div>
    <div id="money">🪙 0</div>
    <div id="btns">
        <button id="brake-btn">🔽</button>
        <button id="gas-btn">🔼</button>
    </div>
    <button id="wheelie-btn">⬆️</button>
    <button id="horn-btn">📢</button>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
    if (typeof THREE === 'undefined') {
        document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Yuklenemedi!</h1>';
        throw new Error('Three yok');
    }

    // AYARLAR
    var mode = 'phone';
    var bikeColor = '#ff3300';
    try { var s = JSON.parse(localStorage.getItem('motorRiderSettings')); if (s && s.mode) mode = s.mode; } catch(e) {}
    try { var c = localStorage.getItem('motorRiderBikeColor'); if (c) bikeColor = c; } catch(e) {}
    if (mode === 'pc') document.body.classList.add('pc-mode');

    // SAHNE
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 40, 100);

    var camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.5, 120);
    camera.position.set(0, 4, -7);
    camera.lookAt(0, 1, 10);

    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    var sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(20, 30, 10);
    scene.add(sun);

    // MOTOR
    var bike = new THREE.Group();
    var red = new THREE.MeshStandardMaterial({ color: bikeColor, roughness: 0.2, metalness: 0.8 });
    var gray = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3 });
    var black = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

    bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 1.7), red).position.set(0, 0.7, 0));
    bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.65, 8), red).rotation.set(Math.PI/2,0,0).position.set(0, 1, 0.3));
    bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.5), black).position.set(0, 0.95, -0.45));
    bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.5), gray).position.set(0, 0.5, -0.05));

    var fw = new THREE.Group(); fw.position.set(0, 0.15, 0.9);
    var ft = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black); fw.add(ft);
    bike.add(fw);

    var rw = new THREE.Group(); rw.position.set(0, 0.15, -0.75);
    var rt = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black); rw.add(rt);
    bike.add(rw);

    bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 6), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 1 })).rotation.set(0,0,Math.PI/2).position.set(0, 1.2, 0.8));

    // Egzoz
    var ex = new THREE.Group();
    ex.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.8, 6), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 1 })).position.set(0.18, 0.2, -0.7).rotation.set(-0.2,0,0));
    ex.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.1, 6), new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.1, metalness: 1, emissive: 0x220000, emissiveIntensity: 0.3 })).position.set(0.18, 0.08, -1.1));
    bike.add(ex);

    // Alev
    var flameGroup = new THREE.Group(); flameGroup.visible = false; bike.add(flameGroup);
    var flames = [];
    function burstFlame() {
        while(flameGroup.children.length>0) flameGroup.remove(flameGroup.children[0]);
        flames = [];
        for (var i=0; i<15; i++) {
            var fl = new THREE.Mesh(new THREE.SphereGeometry(Math.random()*0.04+0.02, 3, 3), new THREE.MeshBasicMaterial({ color: Math.random()>0.5 ? 0xff4400 : 0xffaa00, transparent: true }));
            fl.position.set(0.18+(Math.random()-0.5)*0.1, 0.08, -1.1);
            flames.push({ mesh: fl, vel: new THREE.Vector3((Math.random()-0.5)*1.5, Math.random()*2+0.5, -Math.random()*4-1), life: 0.3+Math.random()*0.3, age: 0 });
            flameGroup.add(fl);
        }
        flameGroup.visible = true;
    }
    function updateFlames(dt) {
        for (var i=flames.length-1; i>=0; i--) {
            var p = flames[i]; p.age += dt;
            p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
            p.mesh.material.opacity = 1 - (p.age/p.life);
            if (p.age >= p.life) { flameGroup.remove(p.mesh); flames.splice(i,1); }
        }
        if (flames.length===0) flameGroup.visible = false;
    }
    scene.add(bike);

    // YOL
    var roadGroup = new THREE.Group(); scene.add(roadGroup);
    var roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
    var grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
    var segments = [];
    var SEG = 25, COUNT = 6;

    for (var i=0; i<COUNT; i++) {
        var g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.PlaneGeometry(8, SEG), roadMat).rotation.set(-Math.PI/2,0,0).position.set(0,0,SEG/2));
        for (var z=0; z<SEG; z+=4) {
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2), new THREE.MeshStandardMaterial({ color: 0xffffff })).rotation.set(-Math.PI/2,0,0).position.set(0,0.01,z+2));
        }
        for (var s=-1; s<=1; s+=2) {
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(10, SEG), grassMat).rotation.set(-Math.PI/2,0,0).position.set(s*9,-0.05,SEG/2));
            for (var t=0; t<2; t++) {
                var tree = new THREE.Group();
                tree.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 2.5, 5), new THREE.MeshStandardMaterial({ color: 0x5a3a1a })).position.set(0,1.2,0));
                tree.add(new THREE.Mesh(new THREE.ConeGeometry(1, 3, 6), new THREE.MeshStandardMaterial({ color: 0x1a5a1a })).position.set(0,3,0));
                tree.position.set(s*(7+Math.random()*4), 0, Math.random()*SEG);
                g.add(tree);
            }
        }
        g.position.z = -i * SEG;
        segments.push(g);
        roadGroup.add(g);
    }

    // SES
    var audioCtx = null;
    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }

    function playExhaustPop() {
        initAudio(); if (!audioCtx) return;
        try {
            var now = audioCtx.currentTime, sr = audioCtx.sampleRate;
            var buf = audioCtx.createBuffer(1, 0.35*sr, sr), d = buf.getChannelData(0);
            for (var i=0; i<d.length; i++) d[i] = ((Math.random()*2-1)*0.4 + Math.sin(2*Math.PI*55*(i/sr))*0.6) * Math.exp(-i/sr*10) * 0.6;
            var src = audioCtx.createBufferSource(); src.buffer = buf;
            var g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.35);
            src.connect(g); g.connect(audioCtx.destination); src.start();
        } catch(e) {}
    }

    function playHorn() {
        initAudio(); if (!audioCtx) return;
        try {
            var o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = 440;
            g.gain.setValueAtTime(0.25, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.3);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime+0.3);
        } catch(e) {}
    }

    // OYUN
    var speed = 0, gear = 0, rpm = 0;
    var money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
    var dist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
    var lastExhaust = Date.now();
    var lateralPos = 0, leanAngle = 0, wheelieAngle = 0;
    var gasOn = false, brakeOn = false, wheelieOn = false;
    var keys = {};
    var gears = [0, 30, 55, 85, 120, 155, 200];

    document.getElementById('gas-btn').addEventListener('touchstart', function(e) { e.preventDefault(); gasOn = true; initAudio(); });
    document.getElementById('gas-btn').addEventListener('touchend', function() { gasOn = false; });
    document.getElementById('brake-btn').addEventListener('touchstart', function(e) { e.preventDefault(); brakeOn = true; });
    document.getElementById('brake-btn').addEventListener('touchend', function() { brakeOn = false; });
    document.getElementById('wheelie-btn').addEventListener('touchstart', function(e) { e.preventDefault(); wheelieOn = true; });
    document.getElementById('wheelie-btn').addEventListener('touchend', function() { wheelieOn = false; });
    document.getElementById('horn-btn').addEventListener('touchstart', function(e) { e.preventDefault(); playHorn(); });

    window.addEventListener('keydown', function(e) { keys[e.key.toLowerCase()] = true; if (keys['h']) playHorn(); initAudio(); });
    window.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

    function getInput() {
        return {
            gas: gasOn || keys['w'] || keys['arrowup'] || false,
            brake: brakeOn || keys['s'] || keys['arrowdown'] || false,
            wheelie: wheelieOn || keys['shift'] || false,
            left: keys['a'] || keys['arrowleft'] || false,
            right: keys['d'] || keys['arrowright'] || false
        };
    }

    var lastTime = Date.now();
    function loop() {
        requestAnimationFrame(loop);
        var now = Date.now(), dt = Math.min((now - lastTime) / 1000, 0.1);
        lastTime = now;

        var input = getInput();

        // Gaz/Fren
        if (input.gas) { if (speed < 0) speed += 50*dt; else speed += 40*dt; }
        if (input.brake) { if (speed > 0) speed -= 60*dt; else if (speed > -30) speed -= 25*dt; }
        if (!input.gas && !input.brake) { if (speed > 0) speed -= 0.8*dt; else if (speed < 0) speed += 0.8*dt; }
        speed = Math.max(-30, Math.min(200, speed));
        if (Math.abs(speed) < 0.2) speed = 0;

        // Vites
        if (speed <= 0) gear = 0;
        else for (var g=6; g>=1; g--) if (speed >= gears[g-1]) { gear = g; break; }

        // RPM
        var absSpd = Math.abs(speed);
        rpm = gear === 0 ? (input.gas ? 0.25 : 0.05) : 0.15 + ((absSpd - gears[gear-1]) / (gears[gear] - gears[gear-1])) * 0.85;
        rpm = Math.max(0, Math.min(1, rpm));

        // Ön kaldırma
        if (input.wheelie && speed > 20) wheelieAngle += 45*dt;
        else wheelieAngle *= 0.85;
        wheelieAngle = Math.max(0, Math.min(45, wheelieAngle));

        // Sağ/Sol
        if (input.left) { lateralPos -= 5*dt; leanAngle = Math.max(-25, leanAngle-45*dt); }
        else if (input.right) { lateralPos += 5*dt; leanAngle = Math.min(25, leanAngle+45*dt); }
        else { leanAngle *= 0.85; }
        lateralPos = Math.max(-3.5, Math.min(3.5, lateralPos));

        // Mesafe/Para
        var d = (Math.abs(speed)/3.6)*dt;
        dist += d; money += d*0.05;

        // HUD
        document.getElementById('speed').textContent = Math.floor(Math.abs(speed));
        document.getElementById('gear').textContent = speed < -0.5 ? 'R' : (gear===0?'N':gear);
        document.getElementById('money').textContent = '🪙 ' + Math.floor(money).toLocaleString('tr-TR');
        var rf = document.getElementById('rpm-inner');
        rf.style.width = (rpm*100) + '%';
        rf.style.background = rpm > 0.9 ? '#ff0000' : rpm > 0.7 ? '#ffd700' : '#00ff88';

        // Egzoz sesi + alev
        if (rpm > 0.5 && Math.abs(speed) > 30 && Date.now() - lastExhaust > 350) {
            playExhaustPop();
            lastExhaust = Date.now();
            burstFlame();
        }

        // Yol
        var move = speed * dt * 0.5;
        for (var i=0; i<segments.length; i++) {
            segments[i].position.z += move;
            if (segments[i].position.z > SEG) segments[i].position.z -= COUNT*SEG;
            if (segments[i].position.z < -COUNT*SEG) segments[i].position.z += COUNT*SEG;
        }

        // Motor pozisyon
        bike.position.x = lateralPos;
        bike.rotation.x = -wheelieAngle * (Math.PI/180);
        bike.rotation.z = -leanAngle * (Math.PI/180);
        bike.position.y = wheelieAngle * 0.015;

        // Tekerlek
        var wr = speed * dt * 0.5;
        ft.rotation.x += wr;
        rt.rotation.x += wr;

        // Kamera
        camera.position.z = -7 - Math.abs(speed)*0.02;
        camera.position.y = 4 + Math.abs(speed)*0.01;
        camera.lookAt(lateralPos*0.3, 1, 10);

        updateFlames(dt);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', function() {
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    setInterval(function() {
        try { localStorage.setItem('motorRiderMoney', Math.floor(money)); localStorage.setItem('motorRiderDistance', dist); } catch(e) {}
    }, 3000);

    lastTime = Date.now();
    loop();
    </script>
</body>
</html>
