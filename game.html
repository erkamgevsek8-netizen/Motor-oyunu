<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider - Sürüş</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff4d00;
            --text: #ffffff;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* GÖSTERGE PANELİ */
        .hud {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .speedometer {
            bottom: 40px;
            left: 25px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 77, 0, 0.5);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            min-width: 100px;
        }

        .speedometer .speed {
            font-size: clamp(40px, 8vw, 60px);
            font-weight: 900;
            color: #ff4d00;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 77, 0, 0.6);
        }

        .speedometer .unit {
            font-size: clamp(10px, 1.5vw, 13px);
            color: #aaa;
            letter-spacing: 2px;
        }

        .gear-indicator {
            bottom: 55px;
            left: 145px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 12px;
            padding: 8px 16px;
            font-size: clamp(18px, 3vw, 26px);
            font-weight: 900;
            color: #ffd700;
        }

        .rpm-bar-container {
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(200px, 50vw, 350px);
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .rpm-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #ffd700, #ff4d00);
            border-radius: 4px;
            transition: width 0.1s;
            width: 0%;
        }

        .rpm-label {
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #aaa;
            letter-spacing: 2px;
        }

        .money-hud {
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(16px, 2.5vw, 20px);
            font-weight: 700;
            color: #ffd700;
        }

        .distance-hud {
            top: 75px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: #aaa;
            letter-spacing: 1px;
        }

        .back-btn {
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            z-index: 20;
            pointer-events: all;
        }

        .mobile-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 30px;
            pointer-events: all;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: rgba(255, 77, 0, 0.4);
            border-color: #ff4d00;
            transform: scale(0.9);
        }

        .ctrl-btn.gas {
            width: 85px;
            height: 85px;
            background: rgba(255, 77, 0, 0.2);
            border-color: rgba(255, 77, 0, 0.6);
            font-size: 32px;
        }

        .wheelie-btn {
            position: fixed;
            right: 30px;
            bottom: 130px;
            z-index: 10;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ffd700;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.15s;
        }

        .wheelie-btn:active {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(0.9);
        }

        .pc-mode .mobile-controls,
        .pc-mode .wheelie-btn {
            display: none !important;
        }

        @media (max-width: 600px) {
            .speedometer {
                bottom: 25px;
                left: 10px;
                padding: 10px 15px;
            }
            .gear-indicator {
                bottom: 40px;
                left: 110px;
                padding: 5px 12px;
                font-size: 20px;
            }
            .ctrl-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .ctrl-btn.gas {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .mobile-controls {
                gap: 20px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <a href="index.html" class="back-btn hud" style="pointer-events:all;">←</a>

    <div class="hud rpm-bar-container">
        <div class="rpm-bar-fill" id="rpm-fill"></div>
    </div>
    <div class="hud rpm-label">RPM</div>

    <div class="hud speedometer">
        <div class="speed" id="speed-display">0</div>
        <div class="unit">KM/H</div>
    </div>

    <div class="hud gear-indicator" id="gear-display">N</div>

    <div class="hud money-hud">
        <span>🪙</span>
        <span id="money-display">0</span>
    </div>

    <div class="hud distance-hud">
        <span>📏 <span id="distance-display">0</span> m</span>
    </div>

    <div class="mobile-controls" id="mobile-controls">
        <button class="ctrl-btn" id="btn-brake" 
                onmousedown="setInput('brake', true)" onmouseup="setInput('brake', false)"
                onmouseleave="setInput('brake', false)"
                ontouchstart="setInput('brake', true); event.preventDefault();" 
                ontouchend="setInput('brake', false); event.preventDefault();">
            🛑
        </button>
        <button class="ctrl-btn gas" id="btn-gas"
                onmousedown="setInput('gas', true)" onmouseup="setInput('gas', false)"
                onmouseleave="setInput('gas', false)"
                ontouchstart="setInput('gas', true); event.preventDefault();" 
                ontouchend="setInput('gas', false); event.preventDefault();">
            🏍️
        </button>
    </div>

    <button class="wheelie-btn" id="btn-wheelie"
            onmousedown="setInput('wheelie', true)" onmouseup="setInput('wheelie', false)"
            onmouseleave="setInput('wheelie', false)"
            ontouchstart="setInput('wheelie', true); event.preventDefault();" 
            ontouchend="setInput('wheelie', false); event.preventDefault();">
        ⬆️
    </button>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============ AYARLAR ============
        const settings = JSON.parse(localStorage.getItem('motorRiderSettings')) || {
            mode: 'phone',
            quality: 'medium',
            sensitivity: 65
        };

        if (settings.mode === 'pc') {
            document.body.classList.add('pc-mode');
        }

        // ============ THREE.JS KURULUM ============
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');
        scene.fog = new THREE.Fog('#1a1a2e', 20, 100);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 200);
        camera.position.set(0, 2.5, -3);
        camera.lookAt(0, 1, 10);

        // ============ IŞIK ============
        scene.add(new THREE.AmbientLight('#404060', 0.5));
        const sunLight = new THREE.DirectionalLight('#ffcc88', 1.5);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);

        // ============ MOTOR MODELİ (Basit) ============
        const bikeGroup = new THREE.Group();
        
        const bodyGeo = new THREE.BoxGeometry(0.4, 0.5, 1.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: '#ff3300', roughness: 0.2, metalness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        bikeGroup.add(body);

        const seatGeo = new THREE.BoxGeometry(0.35, 0.15, 0.6);
        const seatMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.8 });
        const seat = new THREE.Mesh(seatGeo, seatMat);
        seat.position.set(0, 0.9, -0.4);
        bikeGroup.add(seat);

        const frontWheel = new THREE.Mesh(
            new THREE.TorusGeometry(0.3, 0.1, 8, 16),
            new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.9 })
        );
        frontWheel.position.set(0, 0.3, 1.0);
        frontWheel.castShadow = true;
        bikeGroup.add(frontWheel);

        const rearWheel = new THREE.Mesh(
            new THREE.TorusGeometry(0.3, 0.1, 8, 16),
            new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.9 })
        );
        rearWheel.position.set(0, 0.3, -0.8);
        rearWheel.castShadow = true;
        bikeGroup.add(rearWheel);

        const handlebar = new THREE.Mesh(
            new THREE.CylinderGeometry(0.04, 0.04, 0.6, 8),
            new THREE.MeshStandardMaterial({ color: '#ccc', roughness: 0.2, metalness: 1 })
        );
        handlebar.rotation.z = Math.PI / 2;
        handlebar.position.set(0, 1.15, 0.8);
        bikeGroup.add(handlebar);

        scene.add(bikeGroup);

        // ============ SONSUZ YOL ============
        const roadSegments = [];
        const segmentLength = 20;
        const totalSegments = 10;

        const roadMat = new THREE.MeshStandardMaterial({ color: '#333333', roughness: 0.9 });
        const lineMat = new THREE.MeshStandardMaterial({ color: '#ffff00', roughness: 0.5 });
        const grassMat = new THREE.MeshStandardMaterial({ color: '#1a3a1a', roughness: 1 });
        const dirtMat = new THREE.MeshStandardMaterial({ color: '#8B7355', roughness: 1 });

        function createSegment(zPos) {
            const group = new THREE.Group();

            // Yol
            const road = new THREE.Mesh(new THREE.PlaneGeometry(8, segmentLength), roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0, segmentLength / 2);
            road.receiveShadow = true;
            group.add(road);

            // Orta çizgi
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, segmentLength), lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(0, 0.01, segmentLength / 2);
            group.add(line);

            // Kenar çizgileri
            for (let side = -1; side <= 1; side += 2) {
                const edgeLine = new THREE.Mesh(new THREE.PlaneGeometry(0.2, segmentLength), 
                    new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0.5 }));
                edgeLine.rotation.x = -Math.PI / 2;
                edgeLine.position.set(side * 3.5, 0.01, segmentLength / 2);
                group.add(edgeLine);
            }

            // Çimen
            for (let side = -1; side <= 1; side += 2) {
                const grass = new THREE.Mesh(new THREE.PlaneGeometry(10, segmentLength), grassMat);
                grass.rotation.x = -Math.PI / 2;
                grass.position.set(side * 9, -0.05, segmentLength / 2);
                grass.receiveShadow = true;
                group.add(grass);
            }

            // Ağaçlar (basit)
            if (Math.random() > 0.4) {
                for (let side = -1; side <= 1; side += 2) {
                    if (Math.random() > 0.5) {
                        const treeTrunk = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.3, 0.4, 3, 8),
                            new THREE.MeshStandardMaterial({ color: '#5D3A1A' })
                        );
                        treeTrunk.position.set(side * (6 + Math.random() * 5), 1.5, Math.random() * segmentLength);
                        treeTrunk.castShadow = true;
                        group.add(treeTrunk);

                        const treeTop = new THREE.Mesh(
                            new THREE.ConeGeometry(1.5, 3, 8),
                            new THREE.MeshStandardMaterial({ color: '#0d5e0d' })
                        );
                        treeTop.position.set(side * (6 + Math.random() * 5), 3.5, Math.random() * segmentLength);
                        treeTop.castShadow = true;
                        group.add(treeTop);
                    }
                }
            }

            group.position.z = zPos;
            return group;
        }

        // Yol segmentlerini oluştur
        for (let i = 0; i < totalSegments; i++) {
            const seg = createSegment(-i * segmentLength);
            roadSegments.push(seg);
            scene.add(seg);
        }

        // ============ PARA VE MESAFE ============
        let money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        let totalDistance = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        let traveledSinceSave = 0;

        function updateMoneyDisplay() {
            document.getElementById('money-display').textContent = Math.floor(money).toLocaleString('tr-TR');
            document.getElementById('distance-display').textContent = Math.floor(totalDistance);
        }
        updateMoneyDisplay();

        function saveProgress() {
            localStorage.setItem('motorRiderMoney', Math.floor(money));
            localStorage.setItem('motorRiderDistance', totalDistance);
        }

        // ============ INPUT ============
        const input = {
            gas: false, brake: false, wheelie: false,
            steerLeft: false, steerRight: false
        };

        window.setInput = function(name, value) {
            input[name] = value;
        };

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            updateKeys();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            updateKeys();
        });

        function updateKeys() {
            input.gas = keys['w'] || keys['arrowup'] || false;
            input.brake = keys['s'] || keys['arrowdown'] || false;
            input.steerLeft = keys['a'] || keys['arrowleft'] || false;
            input.steerRight = keys['d'] || keys['arrowright'] || false;
            input.wheelie = keys['shift'] || false;
        }

        // ============ FİZİK ============
        const bike = {
            speed: 0,
            maxSpeed: 200,
            gear: 0,
            rpm: 0,
            wheelieAngle: 0,
            lateralPos: 0,
        };

        const gearRatios = [0, 30, 55, 85, 120, 155, 200];

        function updatePhysics(dt) {
            if (input.gas && bike.speed < bike.maxSpeed) {
                bike.speed += 35 * (settings.sensitivity / 100) * dt;
            }
            if (input.brake && bike.speed > 0) {
                bike.speed -= 60 * dt;
            }
            if (!input.gas && !input.brake) {
                bike.speed -= 0.5 * dt;
            }
            bike.speed = Math.max(0, Math.min(bike.maxSpeed, bike.speed));

            // Vites
            if (bike.speed < 1) bike.gear = 0;
            else {
                for (let g = 6; g >= 1; g--) {
                    if (bike.speed >= gearRatios[g-1]) { bike.gear = g; break; }
                }
            }

            // RPM
            if (bike.gear === 0) bike.rpm = input.gas ? 20 : 5;
            else {
                const ratio = (bike.speed - gearRatios[bike.gear-1]) / (gearRatios[bike.gear] - gearRatios[bike.gear-1]);
                bike.rpm = 15 + ratio * 85;
            }

            // Wheelie
            if (input.wheelie && bike.speed > 20 && bike.wheelieAngle < 45) {
                bike.wheelieAngle += 40 * dt;
            } else if (!input.wheelie || bike.speed < 20) {
                bike.wheelieAngle *= 0.85;
            }
            bike.wheelieAngle = Math.max(0, Math.min(45, bike.wheelieAngle));

            // Direksiyon
            if (input.steerLeft) bike.lateralPos -= 5 * dt;
            if (input.steerRight) bike.lateralPos += 5 * dt;
            bike.lateralPos *= 0.9;
            bike.lateralPos = Math.max(-3.5, Math.min(3.5, bike.lateralPos));

            // Mesafe & Para
            const dist = (bike.speed / 3.6) * dt;
            totalDistance += dist;
            traveledSinceSave += dist;
            money += dist * 0.05;

            if (traveledSinceSave > 50) {
                saveProgress();
                traveledSinceSave = 0;
            }
        }

        // ============ HUD ============
        function updateHUD() {
            document.getElementById('speed-display').textContent = Math.floor(bike.speed);
            document.getElementById('gear-display').textContent = bike.gear === 0 ? 'N' : bike.gear;
            document.getElementById('rpm-fill').style.width = bike.rpm + '%';
            updateMoneyDisplay();
        }

        // ============ OYUN DÖNGÜSÜ ============
        const clock = new THREE.Clock();
        let roadOffset = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            updatePhysics(dt);
            updateHUD();

            // Yol hareketi
            roadOffset += bike.speed * dt * 0.5;
            
            roadSegments.forEach((seg, i) => {
                seg.position.z += bike.speed * dt * 0.5;
                if (seg.position.z > segmentLength) {
                    seg.position.z -= totalSegments * segmentLength;
                    // Segmenti yeniden oluştur (yeni ağaçlar vs)
                    scene.remove(seg);
                    const newSeg = createSegment(seg.position.z);
                    roadSegments[i] = newSeg;
                    scene.add(newSeg);
                }
            });

            // Motor pozisyonu
            bikeGroup.position.x = bike.lateralPos;
            bikeGroup.position.z = 0;
            bikeGroup.rotation.x = -bike.wheelieAngle * (Math.PI / 180);
            bikeGroup.position.y = bike.wheelieAngle * 0.01;

            // Tekerlek dönüşü
            frontWheel.rotation.x += bike.speed * dt * 0.5;
            rearWheel.rotation.x += bike.speed * dt * 0.5;

            // Kamera
            camera.position.x = bike.lateralPos * 0.3;
            camera.position.z = -3 - bike.speed * 0.01;
            camera.position.y = 2.5 + bike.speed * 0.005;
            camera.lookAt(bike.lateralPos * 0.5, 1, 5);

            renderer.render(scene, camera);
        }

        // ============ BAŞLAT ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('beforeunload', () => saveProgress());

        console.log('🏍️ Sürüş başladı!');
        updateHUD();
        animate();
    </script>
</body>
</html>
