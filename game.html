<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: Arial; }
        #c { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #speed { position: fixed; bottom: 30px; left: 20px; z-index: 10; font-size: 50px; font-weight: 900; color: #ff4d00; }
        #gear { position: fixed; bottom: 35px; left: 120px; z-index: 10; font-size: 30px; font-weight: 900; color: #ffd700; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; }
        #money { position: fixed; top: 20px; right: 20px; z-index: 10; font-size: 18px; color: #ffd700; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; }
        #back { position: fixed; top: 15px; left: 15px; z-index: 20; background: rgba(0,0,0,0.7); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 20px; }
        #btns { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 30px; }
        #btns button { width: 65px; height: 65px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); font-size: 28px; color: #fff; cursor: pointer; }
        #gas-btn { background: rgba(0,180,0,0.4); border-color: #0f0; }
        #brake-btn { background: rgba(180,0,0,0.4); border-color: #f00; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <a href="index.html" id="back">←</a>
    <div id="speed">0</div>
    <div id="gear">N</div>
    <div id="money">🪙 0</div>
    <div id="btns">
        <button id="brake-btn">🔽</button>
        <button id="gas-btn">🔼</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
    window.onload = function() {
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">❌ Yüklenemedi!<br>İnternet yok veya CDN engelli.</h1>';
            return;
        }

        // Sahne
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

        var camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.5, 150);
        camera.position.set(0, 4, -7);
        camera.lookAt(0, 1, 10);

        var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Işık
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        var sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(20, 30, 10);
        scene.add(sun);

        // Motor
        var bike = new THREE.Group();
        var red = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.2, metalness: 0.8 });
        var gray = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3 });
        var black = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

        var body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 1.7), red);
        body.position.y = 0.7;
        bike.add(body);

        var tank = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.23, 0.65, 8), red);
        tank.rotation.x = Math.PI / 2;
        tank.position.set(0, 1, 0.3);
        bike.add(tank);

        var seat = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.5), black);
        seat.position.set(0, 0.95, -0.45);
        bike.add(seat);

        var engine = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.5), gray);
        engine.position.set(0, 0.5, -0.05);
        bike.add(engine);

        var fw = new THREE.Group();
        fw.position.set(0, 0.15, 0.9);
        var ft = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black);
        fw.add(ft);
        bike.add(fw);

        var rw = new THREE.Group();
        rw.position.set(0, 0.15, -0.75);
        var rt = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black);
        rw.add(rt);
        bike.add(rw);

        var hb = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 6), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 1 }));
        hb.rotation.z = Math.PI / 2;
        hb.position.set(0, 1.2, 0.8);
        bike.add(hb);

        scene.add(bike);

        // Yol
        var roadGroup = new THREE.Group();
        scene.add(roadGroup);
        var roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        var grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.9 });
        var segments = [];
        var SEG = 25;
        var COUNT = 5;

        for (var i = 0; i < COUNT; i++) {
            var g = new THREE.Group();
            
            var road = new THREE.Mesh(new THREE.PlaneGeometry(8, SEG), roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0, SEG / 2);
            g.add(road);

            for (var z = 0; z < SEG; z += 4) {
                var dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(0, 0.01, z + 2);
                g.add(dash);
            }

            for (var s = -1; s <= 1; s += 2) {
                var grass = new THREE.Mesh(new THREE.PlaneGeometry(10, SEG), grassMat);
                grass.rotation.x = -Math.PI / 2;
                grass.position.set(s * 9, -0.02, SEG / 2);
                g.add(grass);

                for (var t = 0; t < 2; t++) {
                    var tree = new THREE.Group();
                    var th = 2 + Math.random() * 2;
                    var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, th, 5), new THREE.MeshStandardMaterial({ color: 0x5a3a1a }));
                    trunk.position.y = th / 2;
                    tree.add(trunk);
                    var leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 3, 6), new THREE.MeshStandardMaterial({ color: 0x1a5a1a }));
                    leaves.position.y = th + 1;
                    tree.add(leaves);
                    tree.position.set(s * (7 + Math.random() * 5), 0, Math.random() * SEG);
                    g.add(tree);
                }
            }

            g.position.z = -i * SEG;
            segments.push(g);
            roadGroup.add(g);
        }

        // Oyun değişkenleri
        var speed = 0;
        var gear = 0;
        var money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        var dist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        var gears = [0, 30, 55, 85, 120, 155, 200];
        var gasOn = false;
        var brakeOn = false;

        // Butonlar
        document.getElementById('gas-btn').addEventListener('touchstart', function(e) { e.preventDefault(); gasOn = true; });
        document.getElementById('gas-btn').addEventListener('touchend', function() { gasOn = false; });
        document.getElementById('brake-btn').addEventListener('touchstart', function(e) { e.preventDefault(); brakeOn = true; });
        document.getElementById('brake-btn').addEventListener('touchend', function() { brakeOn = false; });

        // Klavye
        var keys = {};
        window.addEventListener('keydown', function(e) { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

        function getInput() {
            return {
                gas: gasOn || keys['w'] || keys['arrowup'] || false,
                brake: brakeOn || keys['s'] || keys['arrowdown'] || false
            };
        }

        var lastTime = performance.now();

        function loop() {
            requestAnimationFrame(loop);

            var now = performance.now();
            var dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            var input = getInput();

            if (input.gas && speed < 200) speed += 40 * dt;
            if (input.brake) {
                if (speed > 0) speed -= 60 * dt;
                else if (speed > -30) speed -= 25 * dt;
            }
            if (!input.gas && !input.brake) {
                if (speed > 0) speed -= 0.8 * dt;
                else if (speed < 0) speed += 0.8 * dt;
            }
            speed = Math.max(-30, Math.min(200, speed));
            if (Math.abs(speed) < 0.2) speed = 0;

            if (speed <= 0) gear = 0;
            else for (var g = 6; g >= 1; g--) if (speed >= gears[g-1]) { gear = g; break; }

            var d = (Math.abs(speed) / 3.6) * dt;
            dist += d;
            money += d * 0.05;

            document.getElementById('speed').textContent = Math.floor(Math.abs(speed));
            document.getElementById('gear').textContent = speed < -0.5 ? 'R' : (gear === 0 ? 'N' : gear);
            document.getElementById('money').textContent = '🪙 ' + Math.floor(money).toLocaleString('tr-TR');

            // Yol hareketi
            for (var i = 0; i < segments.length; i++) {
                segments[i].position.z += speed * dt * 0.5;
                if (segments[i].position.z > SEG) segments[i].position.z -= COUNT * SEG;
                if (segments[i].position.z < -COUNT * SEG) segments[i].position.z += COUNT * SEG;
            }

            // Tekerlek
            ft.rotation.x += speed * dt * 0.5;
            rt.rotation.x += speed * dt * 0.5;

            // Kamera
            camera.position.z = -7 - Math.abs(speed) * 0.02;
            camera.position.y = 4 + Math.abs(speed) * 0.01;
            camera.lookAt(0, 1, 10);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setInterval(function() {
            localStorage.setItem('motorRiderMoney', Math.floor(money));
            localStorage.setItem('motorRiderDistance', dist);
        }, 3000);

        lastTime = performance.now();
        loop();
    };
    </script>
</body>
</html>
