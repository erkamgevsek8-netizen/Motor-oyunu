<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider - Sürüş</title>
    <style>
        :root { --accent: #ff4d00; --gold: #ffd700; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000; overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .hud { position: fixed; z-index: 10; pointer-events: none; }
        .speedometer {
            bottom: 40px; left: 25px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,77,0,0.5); border-radius: 20px;
            padding: 15px 20px; text-align: center; min-width: 100px;
        }
        .speedometer .speed { font-size: clamp(40px,8vw,60px); font-weight: 900; color: #ff4d00; line-height: 1; }
        .speedometer .unit { font-size: 12px; color: #aaa; letter-spacing: 2px; }
        .gear-indicator {
            bottom: 55px; left: 145px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.5); border-radius: 12px;
            padding: 8px 16px; font-size: 22px; font-weight: 900; color: #ffd700;
        }
        .rpm-bar-container {
            top: 25px; left: 50%; transform: translateX(-50%);
            width: clamp(200px,50vw,350px); height: 8px;
            background: rgba(255,255,255,0.1); border-radius: 4px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        .rpm-bar-fill { height: 100%; border-radius: 4px; width: 0%; }
        .rpm-label { top: 38px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #aaa; letter-spacing: 2px; }
        .money-hud {
            top: 25px; right: 25px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.4); border-radius: 30px;
            padding: 10px 20px; display: flex; align-items: center; gap: 8px;
            font-size: 18px; font-weight: 700; color: #ffd700;
        }
        .distance-hud {
            top: 75px; right: 25px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 6px 16px; font-size: 13px; color: #aaa;
        }
        .back-btn {
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 18px; text-decoration: none;
            z-index: 20; pointer-events: all;
        }
        .mobile-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 30px; pointer-events: all;
        }
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff; cursor: pointer; transition: all 0.15s;
        }
        .ctrl-btn:active { background: rgba(255,77,0,0.4); border-color: #ff4d00; transform: scale(0.9); }
        .ctrl-btn.gas { width: 85px; height: 85px; background: rgba(255,77,0,0.2); border-color: rgba(255,77,0,0.6); font-size: 32px; }
        .wheelie-btn {
            position: fixed; right: 30px; bottom: 130px; z-index: 10;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(255,215,0,0.15); border: 2px solid rgba(255,215,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #ffd700; cursor: pointer; pointer-events: all; transition: all 0.15s;
        }
        .horn-btn {
            position: fixed; left: 30px; bottom: 130px; z-index: 10;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(255,255,0,0.15); border: 2px solid rgba(255,255,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #ff0; cursor: pointer; pointer-events: all; transition: all 0.15s;
        }
        .pc-mode .mobile-controls, .pc-mode .wheelie-btn, .pc-mode .horn-btn { display: none !important; }
        @media (max-width:600px) {
            .speedometer { bottom: 25px; left: 10px; padding: 10px 15px; }
            .gear-indicator { bottom: 40px; left: 110px; padding: 5px 12px; font-size: 20px; }
            .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
            .ctrl-btn.gas { width: 70px; height: 70px; font-size: 28px; }
            .mobile-controls { gap: 20px; bottom: 20px; }
            .horn-btn { left: 15px; bottom: 120px; width: 45px; height: 45px; font-size: 18px; }
            .wheelie-btn { right: 15px; bottom: 120px; width: 45px; height: 45px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <a href="index.html" class="back-btn hud" style="pointer-events:all;">←</a>

    <div class="hud rpm-bar-container"><div class="rpm-bar-fill" id="rpm-fill"></div></div>
    <div class="hud rpm-label">RPM</div>
    <div class="hud speedometer"><div class="speed" id="speed-display">0</div><div class="unit">KM/H</div></div>
    <div class="hud gear-indicator" id="gear-display">N</div>
    <div class="hud money-hud"><span>🪙</span> <span id="money-display">0</span></div>
    <div class="hud distance-hud">📏 <span id="distance-display">0</span> m</div>

    <div class="mobile-controls" id="mobile-controls">
        <button class="ctrl-btn" id="btn-brake"
            onmousedown="setInput('brake',true)" onmouseup="setInput('brake',false)" onmouseleave="setInput('brake',false)"
            ontouchstart="setInput('brake',true);event.preventDefault()" ontouchend="setInput('brake',false);event.preventDefault()">🛑</button>
        <button class="ctrl-btn gas" id="btn-gas"
            onmousedown="setInput('gas',true)" onmouseup="setInput('gas',false)" onmouseleave="setInput('gas',false)"
            ontouchstart="setInput('gas',true);event.preventDefault()" ontouchend="setInput('gas',false);event.preventDefault()">🏍️</button>
    </div>

    <button class="wheelie-btn" id="btn-wheelie"
        onmousedown="setInput('wheelie',true)" onmouseup="setInput('wheelie',false)" onmouseleave="setInput('wheelie',false)"
        ontouchstart="setInput('wheelie',true);event.preventDefault()" ontouchend="setInput('wheelie',false);event.preventDefault()">⬆️</button>

    <button class="horn-btn" id="btn-horn"
        onmousedown="setInput('horn',true)" onmouseup="setInput('horn',false)" onmouseleave="setInput('horn',false)"
        ontouchstart="setInput('horn',true);event.preventDefault()" ontouchend="setInput('horn',false);event.preventDefault()">📢</button>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============ AYARLAR ============
        const settings = JSON.parse(localStorage.getItem('motorRiderSettings')) || { mode: 'phone', sensitivity: 65 };
        if (settings.mode === 'pc') document.body.classList.add('pc-mode');
        const bikeColor = localStorage.getItem('motorRiderBikeColor') || '#ff3300';

        // ============ THREE.JS ============
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.Fog('#87CEEB', 30, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 200);
        camera.position.set(0, 3.5, -5);

        scene.add(new THREE.AmbientLight('#ffffff', 0.6));
        const sun = new THREE.DirectionalLight('#fff8e7', 1.8);
        sun.position.set(20, 30, 10); sun.castShadow = true;
        sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // ============ MOTOR ============
        const bikeGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: bikeColor, roughness: 0.2, metalness: 0.8 });
        const darkMat = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.3, metalness: 0.7 });
        const chromeMat = new THREE.MeshStandardMaterial({ color: '#ccc', roughness: 0.1, metalness: 1 });
        const tireMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.9 });
        const seatMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.8 });

        bikeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 1.7), bodyMat).position.set(0, 0.65, 0));
        bikeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.5), darkMat).position.set(0, 0.5, -0.05));
        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.23, 0.65, 12), bodyMat);
        tank.rotation.x = Math.PI / 2; tank.position.set(0, 0.9, 0.25); bikeGroup.add(tank);
        bikeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.12, 0.55), seatMat).position.set(0, 0.92, -0.45));
        bikeGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 12),
            new THREE.MeshStandardMaterial({ color: '#fff', emissive: '#fff', emissiveIntensity: 0.8 })).rotation.set(Math.PI/2,0,0).position.set(0, 0.85, 1.0));

        // Ön teker - YUVARLAK (20 segment)
        const frontWheel = new THREE.Group();
        frontWheel.position.set(0, 0.15, 0.9);
        const ft = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 16, 24), tireMat);
        frontWheel.add(ft);
        const frim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 20), chromeMat);
        frim.rotation.x = Math.PI / 2; frontWheel.add(frim);
        bikeGroup.add(frontWheel);

        // Arka teker - YUVARLAK (20 segment)
        const rearWheel = new THREE.Group();
        rearWheel.position.set(0, 0.15, -0.75);
        const rt = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 16, 24), tireMat);
        rearWheel.add(rt);
        const rrim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 20), chromeMat);
        rrim.rotation.x = Math.PI / 2; rearWheel.add(rrim);
        bikeGroup.add(rearWheel);

        bikeGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.65, 8), chromeMat).rotation.set(0,0,Math.PI/2).position.set(0, 1.2, 0.8));
        bikeGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.8, 8), chromeMat).position.set(0.18, 0.2, -0.85).rotation.set(-0.2,0,0));

        scene.add(bikeGroup);

        // ============ YOL + BİNALAR + LAMBALAR ============
        const roadGroup = new THREE.Group(); scene.add(roadGroup);
        const roadMat = new THREE.MeshStandardMaterial({ color: '#444', roughness: 0.8 });
        const grassMat = new THREE.MeshStandardMaterial({ color: '#2d5a1e', roughness: 0.9 });
        const bMats = [
            new THREE.MeshStandardMaterial({ color: '#c4a882', roughness: 0.6 }),
            new THREE.MeshStandardMaterial({ color: '#d5c4a1', roughness: 0.5 }),
            new THREE.MeshStandardMaterial({ color: '#b8c5d0', roughness: 0.4, metalness: 0.3 })
        ];
        const segments = [];
        const segLen = 25;
        const totalSegs = 8;

        function createSegment(zStart) {
            const g = new THREE.Group();
            const road = new THREE.Mesh(new THREE.PlaneGeometry(8, segLen), roadMat);
            road.rotation.x = -Math.PI / 2; road.position.set(0, 0.01, segLen / 2); g.add(road);

            for (let z = 0; z < segLen; z += 4) {
                const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2.5), new THREE.MeshStandardMaterial({ color: '#fff' }));
                dash.rotation.x = -Math.PI / 2; dash.position.set(0, 0.02, z + 1.5); g.add(dash);
            }
            for (let s = -1; s <= 1; s += 2) {
                g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.2, segLen), new THREE.MeshStandardMaterial({ color: '#fff' })).rotation.set(-Math.PI/2,0,0).position.set(s*3.5, 0.02, segLen/2));
                g.add(new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, segLen), new THREE.MeshStandardMaterial({ color: '#999' })).position.set(s*4.7, -0.05, segLen/2));
                g.add(new THREE.Mesh(new THREE.PlaneGeometry(8, segLen), grassMat).rotation.set(-Math.PI/2,0,0).position.set(s*10, -0.02, segLen/2));

                // Ağaçlar
                for (let t = 0; t < 3; t++) {
                    const tree = new THREE.Group();
                    const th = 2 + Math.random() * 2;
                    tree.add(new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, th, 6), new THREE.MeshStandardMaterial({ color: '#8B5E3C' })).position.set(0, th/2, 0));
                    tree.add(new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshStandardMaterial({ color: '#1a5c1a' })).position.set(0, th+1.2, 0));
                    tree.position.set(s * (7 + Math.random() * 5), 0, Math.random() * segLen); g.add(tree);
                }

                // Binalar
                if (Math.random() > 0.4) {
                    const bw = 3 + Math.random() * 5, bh = 8 + Math.random() * 20, bd = 4 + Math.random() * 6;
                    const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bMats[Math.floor(Math.random() * 3)]);
                    b.position.set(s * (9 + bw/2 + Math.random() * 3), bh/2, Math.random() * (segLen - bd));
                    b.castShadow = true; g.add(b);
                }

                // Lamba direkleri
                if (Math.random() > 0.4) {
                    const pole = new THREE.Group();
                    pole.add(new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 7, 6), new THREE.MeshStandardMaterial({ color: '#555', roughness: 0.4, metalness: 0.7 })).position.set(0, 3.5, 0));
                    pole.add(new THREE.Mesh(new THREE.SphereGeometry(0.3, 8), new THREE.MeshStandardMaterial({ color: '#ffd', emissive: '#ffd', emissiveIntensity: 0.4 })).position.set(0, 7, 0));
                    pole.position.set(s * 5.5, 0, Math.random() * segLen); g.add(pole);
                }
            }
            g.position.z = zStart;
            return g;
        }

        for (let i = 0; i < totalSegs; i++) {
            segments.push(createSegment(-i * segLen));
            roadGroup.add(segments[i]);
        }

        // ============ SES ============
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playHorn() {
            initAudio(); if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = 440;
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        // ============ PARA ============
        let money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        let totalDist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        let saveCounter = 0;

        function updateMoney() {
            document.getElementById('money-display').textContent = Math.floor(money).toLocaleString('tr-TR');
            document.getElementById('distance-display').textContent = Math.floor(totalDist);
        }
        updateMoney();
        function saveProgress() { localStorage.setItem('motorRiderMoney', Math.floor(money)); localStorage.setItem('motorRiderDistance', totalDist); }

        // ============ INPUT ============
        const input = { gas: false, brake: false, wheelie: false, horn: false, steerLeft: false, steerRight: false };
        window.setInput = function(name, val) { input[name] = val; if (name === 'horn' && val) playHorn(); };
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; updateKeys(); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; updateKeys(); });
        function updateKeys() {
            input.gas = keys['w'] || keys['arrowup'] || false;
            input.brake = keys['s'] || keys['arrowdown'] || false;
            input.steerLeft = keys['a'] || keys['arrowleft'] || false;
            input.steerRight = keys['d'] || keys['arrowright'] || false;
            input.wheelie = keys['shift'] || false;
            if (keys['h']) playHorn();
        }

        // ============ FİZİK ============
        const bike = { speed: 0, maxSpeed: 200, gear: 0, rpm: 0, wheelieAngle: 0, lateralPos: 0, leanAngle: 0 };
        const gearRatios = [0, 30, 55, 85, 120, 155, 200];

        function updatePhysics(dt) {
            if (input.gas) { if (bike.speed < 0) bike.speed += 50*dt; else if (bike.speed < 200) bike.speed += 40*(settings.sensitivity/100)*dt; }
            if (input.brake) { if (bike.speed > 0) bike.speed -= 70*dt; else if (bike.speed > -30) bike.speed -= 30*dt; }
            if (!input.gas && !input.brake) { if (bike.speed > 0) bike.speed -= 0.8*dt; else if (bike.speed < 0) bike.speed += 0.8*dt; }
            bike.speed = Math.max(-30, Math.min(200, bike.speed));
            if (Math.abs(bike.speed) < 0.1) bike.speed = 0;

            if (bike.speed < 1) bike.gear = 0;
            else for (let g = 6; g >= 1; g--) if (bike.speed >= gearRatios[g-1]) { bike.gear = g; break; }
            if (bike.speed < 0) bike.gear = 0;

            const absSpd = Math.abs(bike.speed);
            bike.rpm = bike.gear === 0 ? (input.gas ? 25 : 5) : 15 + ((absSpd - gearRatios[bike.gear-1]) / (gearRatios[bike.gear] - gearRatios[bike.gear-1])) * 85;
            bike.rpm = Math.max(0, Math.min(100, bike.rpm));

            if (input.wheelie && bike.speed > 20) bike.wheelieAngle += 45*dt;
            else bike.wheelieAngle *= 0.85;
            bike.wheelieAngle = Math.max(0, Math.min(45, bike.wheelieAngle));

            // SAĞ-SOL SABİT (bırakınca ortaya dönmez)
            if (input.steerLeft) { bike.lateralPos -= 6*dt; bike.leanAngle = Math.max(-25, bike.leanAngle-50*dt); }
            else if (input.steerRight) { bike.lateralPos += 6*dt; bike.leanAngle = Math.min(25, bike.leanAngle+50*dt); }
            else { bike.leanAngle *= 0.9; }
            bike.lateralPos = Math.max(-3.5, Math.min(3.5, bike.lateralPos));

            const d = (Math.abs(bike.speed)/3.6)*dt;
            totalDist += d; saveCounter += d;
            money += d*0.05;
            if (saveCounter > 50) { saveProgress(); saveCounter = 0; }
        }

        function updateHUD() {
            document.getElementById('speed-display').textContent = Math.floor(Math.abs(bike.speed));
            document.getElementById('gear-display').textContent = bike.speed < -0.5 ? 'R' : (bike.gear === 0 ? 'N' : bike.gear);
            const rf = document.getElementById('rpm-fill');
            rf.style.width = bike.rpm + '%';
            rf.style.background = bike.rpm > 90 ? '#ff0000' : bike.rpm > 70 ? 'linear-gradient(90deg, #ffd700, #ff4d00)' : 'linear-gradient(90deg, #00ff88, #ffd700)';
            updateMoney();
        }

        // ============ OYUN DÖNGÜSÜ ============
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            updatePhysics(dt); updateHUD();

            // YOL: -bike.speed = W basınca yol GERİYE akar (ileri gidiyor gibi)
            const moveSpeed = -bike.speed * dt * 0.5;
            segments.forEach(seg => {
                seg.position.z += moveSpeed;
                if (seg.position.z > segLen) seg.position.z -= totalSegs * segLen;
                if (seg.position.z < -segLen * totalSegs) seg.position.z += totalSegs * segLen;
            });

            bikeGroup.position.x = bike.lateralPos;
            bikeGroup.rotation.x = -bike.wheelieAngle * (Math.PI/180);
            bikeGroup.rotation.z = -bike.leanAngle * (Math.PI/180);
            bikeGroup.position.y = bike.wheelieAngle * 0.015;

            // Tekerlek: -bike.speed = doğru yönde döner
            const wheelRot = -bike.speed * dt * 0.5;
            ft.rotation.x += wheelRot;
            rt.rotation.x += wheelRot;

            camera.position.x += (bike.lateralPos*0.4 - camera.position.x)*3*dt;
            camera.position.y += (3.5 + Math.abs(bike.speed)*0.008 - camera.position.y)*3*dt;
            camera.position.z += (-5 - Math.abs(bike.speed)*0.02 - camera.position.z)*3*dt;
            camera.lookAt(bike.lateralPos*0.6, 1.2, 10);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        window.addEventListener('beforeunload', saveProgress);
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        updateHUD();
        animate();
    </script>
</body>
</html>
