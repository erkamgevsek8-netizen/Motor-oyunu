<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider - Sürüş</title>
    <style>
        :root { --accent: #ff4d00; --gold: #ffd700; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000; overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .hud { position: fixed; z-index: 10; pointer-events: none; }
        .speedometer {
            bottom: 40px; left: 25px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,77,0,0.5); border-radius: 20px;
            padding: 15px 20px; text-align: center; min-width: 100px;
        }
        .speedometer .speed { font-size: clamp(40px,8vw,60px); font-weight: 900; color: #ff4d00; line-height: 1; }
        .speedometer .unit { font-size: 12px; color: #aaa; letter-spacing: 2px; }
        .gear-indicator {
            bottom: 55px; left: 145px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.5); border-radius: 12px;
            padding: 8px 16px; font-size: 22px; font-weight: 900; color: #ffd700;
        }
        .rpm-bar-container {
            top: 25px; left: 50%; transform: translateX(-50%);
            width: clamp(200px,50vw,350px); height: 8px;
            background: rgba(255,255,255,0.1); border-radius: 4px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        .rpm-bar-fill { height: 100%; border-radius: 4px; width: 0%; }
        .rpm-label { top: 38px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #aaa; letter-spacing: 2px; }
        .money-hud {
            top: 25px; right: 25px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.4); border-radius: 30px;
            padding: 10px 20px; display: flex; align-items: center; gap: 8px;
            font-size: 18px; font-weight: 700; color: #ffd700;
        }
        .distance-hud {
            top: 75px; right: 25px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 6px 16px; font-size: 13px; color: #aaa;
        }
        .back-btn {
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 18px; text-decoration: none;
            z-index: 20; pointer-events: all;
        }
        .mobile-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 30px; pointer-events: all;
        }
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff; cursor: pointer; transition: all 0.15s;
        }
        .ctrl-btn:active { background: rgba(255,77,0,0.4); border-color: #ff4d00; transform: scale(0.9); }
        .ctrl-btn.gas { width: 85px; height: 85px; background: rgba(255,77,0,0.2); border-color: rgba(255,77,0,0.6); font-size: 32px; }
        .wheelie-btn {
            position: fixed; right: 30px; bottom: 130px; z-index: 10;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(255,215,0,0.15); border: 2px solid rgba(255,215,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #ffd700; cursor: pointer; pointer-events: all; transition: all 0.15s;
        }
        .horn-btn {
            position: fixed; left: 30px; bottom: 130px; z-index: 10;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(255,255,0,0.15); border: 2px solid rgba(255,255,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #ff0; cursor: pointer; pointer-events: all; transition: all 0.15s;
        }
        .pc-mode .mobile-controls, .pc-mode .wheelie-btn, .pc-mode .horn-btn { display: none !important; }
        @media (max-width:600px) {
            .speedometer { bottom: 25px; left: 10px; padding: 10px 15px; }
            .gear-indicator { bottom: 40px; left: 110px; padding: 5px 12px; font-size: 20px; }
            .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
            .ctrl-btn.gas { width: 70px; height: 70px; font-size: 28px; }
            .mobile-controls { gap: 20px; bottom: 20px; }
            .horn-btn { left: 15px; bottom: 120px; width: 45px; height: 45px; font-size: 18px; }
            .wheelie-btn { right: 15px; bottom: 120px; width: 45px; height: 45px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <a href="index.html" class="back-btn hud" style="pointer-events:all;">←</a>

    <div class="hud rpm-bar-container"><div class="rpm-bar-fill" id="rpm-fill"></div></div>
    <div class="hud rpm-label">RPM</div>
    <div class="hud speedometer"><div class="speed" id="speed-display">0</div><div class="unit">KM/H</div></div>
    <div class="hud gear-indicator" id="gear-display">N</div>
    <div class="hud money-hud"><span>🪙</span> <span id="money-display">0</span></div>
    <div class="hud distance-hud">📏 <span id="distance-display">0</span> m</div>

    <div class="mobile-controls" id="mobile-controls">
        <button class="ctrl-btn" id="btn-brake"
            onmousedown="setInput('brake',true)" onmouseup="setInput('brake',false)" onmouseleave="setInput('brake',false)"
            ontouchstart="setInput('brake',true);event.preventDefault()" ontouchend="setInput('brake',false);event.preventDefault()">🛑</button>
        <button class="ctrl-btn gas" id="btn-gas"
            onmousedown="setInput('gas',true)" onmouseup="setInput('gas',false)" onmouseleave="setInput('gas',false)"
            ontouchstart="setInput('gas',true);event.preventDefault()" ontouchend="setInput('gas',false);event.preventDefault()">🏍️</button>
    </div>

    <button class="wheelie-btn" id="btn-wheelie"
        onmousedown="setInput('wheelie',true)" onmouseup="setInput('wheelie',false)" onmouseleave="setInput('wheelie',false)"
        ontouchstart="setInput('wheelie',true);event.preventDefault()" ontouchend="setInput('wheelie',false);event.preventDefault()">⬆️</button>

    <button class="horn-btn" id="btn-horn"
        onmousedown="setInput('horn',true)" onmouseup="setInput('horn',false)" onmouseleave="setInput('horn',false)"
        ontouchstart="setInput('horn',true);event.preventDefault()" ontouchend="setInput('horn',false);event.preventDefault()">📢</button>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============ AYARLAR ============
        const settings = JSON.parse(localStorage.getItem('motorRiderSettings')) || { mode: 'phone', sensitivity: 65 };
        if (settings.mode === 'pc') document.body.classList.add('pc-mode');

        // 🎨 GARAJ RENGİ
        const bikeColor = localStorage.getItem('motorRiderBikeColor') || '#ff3300';
        console.log('🎨 Motor rengi:', bikeColor);

        // ============ THREE.JS ============
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.Fog('#87CEEB', 30, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 200);
        camera.position.set(0, 3.5, -5);
        camera.lookAt(0, 1, 10);

        // ============ IŞIK ============
        scene.add(new THREE.AmbientLight('#ffffff', 0.6));
        const sun = new THREE.DirectionalLight('#fff8e7', 1.8);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
        sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
        sun.shadow.camera.far = 150;
        scene.add(sun);

        // ============ MOTOR (GARAJ RENGİ İLE) ============
        const bikeGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: bikeColor, roughness: 0.2, metalness: 0.8 });
        const darkMat = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.3, metalness: 0.7 });
        const chromeMat = new THREE.MeshStandardMaterial({ color: '#ccc', roughness: 0.1, metalness: 1 });
        const tireMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.9 });
        const seatMat = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.8 });

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 1.7), bodyMat);
        body.position.y = 0.65; body.castShadow = true; bikeGroup.add(body);

        const engine = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.5), darkMat);
        engine.position.set(0, 0.5, -0.05); engine.castShadow = true; bikeGroup.add(engine);

        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.23, 0.65, 12), bodyMat);
        tank.rotation.x = Math.PI / 2; tank.position.set(0, 0.9, 0.25); tank.castShadow = true; bikeGroup.add(tank);

        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.12, 0.55), seatMat);
        seat.position.set(0, 0.92, -0.45); bikeGroup.add(seat);

        const headlight = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 12),
            new THREE.MeshStandardMaterial({ color: '#fff', emissive: '#fff', emissiveIntensity: 0.8 }));
        headlight.rotation.x = Math.PI / 2; headlight.position.set(0, 0.85, 1.0); bikeGroup.add(headlight);

        const frontWheel = new THREE.Group();
        frontWheel.position.set(0, 0.15, 0.9);
        frontWheel.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 16), tireMat));
        const fr = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 16), chromeMat);
        fr.rotation.x = Math.PI / 2; frontWheel.add(fr); bikeGroup.add(frontWheel);

        const rearWheel = new THREE.Group();
        rearWheel.position.set(0, 0.15, -0.75);
        rearWheel.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 16), tireMat));
        const rr = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 16), chromeMat);
        rr.rotation.x = Math.PI / 2; rearWheel.add(rr); bikeGroup.add(rearWheel);

        const hbar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.65, 8), chromeMat);
        hbar.rotation.z = Math.PI / 2; hbar.position.set(0, 1.2, 0.8); bikeGroup.add(hbar);

        const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.8, 8), chromeMat);
        exhaust.position.set(0.18, 0.2, -0.85); exhaust.rotation.x = -0.2; bikeGroup.add(exhaust);

        scene.add(bikeGroup);

        // ============ YOL VE ÇEVRE ============
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);

        const roadMat = new THREE.MeshStandardMaterial({ color: '#444', roughness: 0.8 });
        const sidewalkMat = new THREE.MeshStandardMaterial({ color: '#999', roughness: 0.7 });
        const grassMat = new THREE.MeshStandardMaterial({ color: '#2d5a1e', roughness: 0.9 });
        const buildingMat1 = new THREE.MeshStandardMaterial({ color: '#c4a882', roughness: 0.6 });
        const buildingMat2 = new THREE.MeshStandardMaterial({ color: '#d5c4a1', roughness: 0.5 });
        const buildingMat3 = new THREE.MeshStandardMaterial({ color: '#b8c5d0', roughness: 0.4, metalness: 0.3 });

        const segments = [];
        const segLen = 25;
        const totalSegs = 8;

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunkH = 2 + Math.random() * 2;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, trunkH, 6),
                new THREE.MeshStandardMaterial({ color: '#8B5E3C', roughness: 0.9 }));
            trunk.position.y = trunkH / 2;
            trunk.castShadow = true;
            tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8),
                new THREE.MeshStandardMaterial({ color: '#1a5c1a', roughness: 0.8 }));
            leaves.position.y = trunkH + 1;
            leaves.castShadow = true;
            tree.add(leaves);
            tree.position.set(x, 0, z);
            return tree;
        }

        function createBuilding(x, z, w, h, d, mat) {
            const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            building.position.set(x, h / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            return building;
        }

        function createLampPost(x, z) {
            const post = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 7, 6),
                new THREE.MeshStandardMaterial({ color: '#555', roughness: 0.4, metalness: 0.7 }));
            pole.position.y = 3.5;
            pole.castShadow = true;
            post.add(pole);
            const light = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8),
                new THREE.MeshStandardMaterial({ color: '#ffd', emissive: '#ffd', emissiveIntensity: 0.4 }));
            light.position.y = 7;
            post.add(light);
            post.position.set(x, 0, z);
            return post;
        }

        function createSegment(zStart) {
            const group = new THREE.Group();

            const road = new THREE.Mesh(new THREE.PlaneGeometry(8, segLen), roadMat);
            road.rotation.x = -Math.PI / 2; road.position.set(0, 0.01, segLen / 2);
            road.receiveShadow = true; group.add(road);

            for (let z = 0; z < segLen; z += 4) {
                const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2.5),
                    new THREE.MeshStandardMaterial({ color: '#fff', roughness: 0.3, emissive: '#fff', emissiveIntensity: 0.2 }));
                dash.rotation.x = -Math.PI / 2; dash.position.set(0, 0.02, z + 1.5); group.add(dash);
            }

            for (let s = -1; s <= 1; s += 2) {
                const edge = new THREE.Mesh(new THREE.PlaneGeometry(0.2, segLen),
                    new THREE.MeshStandardMaterial({ color: '#fff', roughness: 0.3 }));
                edge.rotation.x = -Math.PI / 2; edge.position.set(s * 3.5, 0.02, segLen / 2); group.add(edge);
            }

            for (let s = -1; s <= 1; s += 2) {
                const sw = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, segLen), sidewalkMat);
                sw.position.set(s * 4.7, -0.05, segLen / 2); sw.receiveShadow = true; group.add(sw);
            }

            for (let s = -1; s <= 1; s += 2) {
                const grass = new THREE.Mesh(new THREE.PlaneGeometry(8, segLen), grassMat);
                grass.rotation.x = -Math.PI / 2; grass.position.set(s * 10, -0.02, segLen / 2);
                grass.receiveShadow = true; group.add(grass);
            }

            for (let s = -1; s <= 1; s += 2) {
                const treeCount = 2 + Math.floor(Math.random() * 3);
                for (let t = 0; t < treeCount; t++) {
                    const tree = createTree(s * (7 + Math.random() * 5), Math.random() * segLen);
                    group.add(tree);
                }
            }

            if (Math.random() > 0.3) {
                const mats = [buildingMat1, buildingMat2, buildingMat3];
                for (let s = -1; s <= 1; s += 2) {
                    if (Math.random() > 0.3) {
                        const bw = 3 + Math.random() * 5;
                        const bh = 8 + Math.random() * 20;
                        const bd = 4 + Math.random() * 8;
                        const building = createBuilding(s * (10 + bw / 2), Math.random() * (segLen - bd), bw, bh, bd,
                            mats[Math.floor(Math.random() * 3)]);
                        group.add(building);
                    }
                }
            }

            for (let s = -1; s <= 1; s += 2) {
                if (Math.random() > 0.3) {
                    const lamp = createLampPost(s * 5.5, Math.random() * segLen);
                    group.add(lamp);
                }
            }

            group.position.z = zStart;
            return group;
        }

        for (let i = 0; i < totalSegs; i++) {
            const seg = createSegment(-i * segLen);
            segments.push(seg);
            roadGroup.add(seg);
        }

        // ============ SES SİSTEMİ ============
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let engineRunning = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function startEngineSound() {
            if (engineRunning) return;
            initAudio();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            const distortion = audioCtx.createWaveShaper();
            distortion.curve = new Float32Array([0, 0.3, 0.5, 0.5, 0.4, 0.2, -0.1, -0.3, -0.2, 0]);
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 60;
            engineGain.gain.value = 0;
            engineOsc.connect(distortion);
            distortion.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
            engineRunning = true;
        }

        function updateEngineSound(speed, rpm) {
            if (!engineRunning) return;
            const freq = 40 + (rpm / 100) * 120 + (speed / 200) * 60;
            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
            const vol = 0.01 + (rpm / 100) * 0.08;
            engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
        }

        function stopEngineSound() {
            if (engineRunning && engineGain) {
                engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                setTimeout(() => { if (engineOsc) { engineOsc.stop(); engineRunning = false; } }, 200);
            }
        }

        function playHorn() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playExhaustPop() {
            initAudio();
            const buf = audioCtx.createBuffer(1, 0.4 * audioCtx.sampleRate, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) {
                d[i] = (Math.random() * 2 - 1) * Math.exp(-i / audioCtx.sampleRate * 12) * 0.5;
            }
            const src = audioCtx.createBufferSource(); src.buffer = buf;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.6, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            src.connect(g); g.connect(audioCtx.destination); src.start();
        }

        // ============ PARA ============
        let money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        let totalDist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        let saveCounter = 0;

        function updateMoney() {
            document.getElementById('money-display').textContent = Math.floor(money).toLocaleString('tr-TR');
            document.getElementById('distance-display').textContent = Math.floor(totalDist);
        }
        updateMoney();

        function saveProgress() {
            localStorage.setItem('motorRiderMoney', Math.floor(money));
            localStorage.setItem('motorRiderDistance', totalDist);
        }

        // ============ INPUT ============
        const input = { gas: false, brake: false, wheelie: false, horn: false, steerLeft: false, steerRight: false };
        window.setInput = function(name, val) {
            input[name] = val;
            if (name === 'gas' && val) { initAudio(); startEngineSound(); }
            if (name === 'horn' && val) playHorn();
        };

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; updateKeys(); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; updateKeys(); });
        function updateKeys() {
            input.gas = keys['w'] || keys['arrowup'] || false;
            input.brake = keys['s'] || keys['arrowdown'] || false;
            input.steerLeft = keys['a'] || keys['arrowleft'] || false;
            input.steerRight = keys['d'] || keys['arrowright'] || false;
            input.wheelie = keys['shift'] || false;
            input.horn = keys['h'] || false;
            if (input.gas) { initAudio(); startEngineSound(); }
            if (input.horn) playHorn();
        }

        // ============ FİZİK ============
        const bike = { speed: 0, maxSpeed: 200, gear: 0, rpm: 0, wheelieAngle: 0, lateralPos: 0, leanAngle: 0 };
        const gearRatios = [0, 30, 55, 85, 120, 155, 200];

        function updatePhysics(dt) {
            if (input.gas && bike.speed < bike.maxSpeed) {
                bike.speed += 40 * (settings.sensitivity / 100) * dt;
            }
            if (input.brake) {
                if (bike.speed > 0) {
                    bike.speed -= 70 * dt;
                } else if (bike.speed <= 0 && bike.speed > -30) {
                    bike.speed -= 30 * dt;
                }
            }
            if (!input.gas && !input.brake) {
                if (bike.speed > 0) bike.speed -= 0.8 * dt;
                else if (bike.speed < 0) bike.speed += 0.8 * dt;
            }

            bike.speed = Math.max(-30, Math.min(bike.maxSpeed, bike.speed));
            if (Math.abs(bike.speed) < 0.1) bike.speed = 0;

            if (bike.speed < 1) bike.gear = 0;
            else {
                for (let g = 6; g >= 1; g--) {
                    if (bike.speed >= gearRatios[g - 1]) { bike.gear = g; break; }
                }
            }
            if (bike.speed < 0) bike.gear = 0;

            const absSpeed = Math.abs(bike.speed);
            if (bike.gear === 0) bike.rpm = input.gas ? 25 : 5;
            else {
                const ratio = (absSpeed - gearRatios[bike.gear - 1]) / (gearRatios[bike.gear] - gearRatios[bike.gear - 1]);
                bike.rpm = 15 + ratio * 85;
            }
            bike.rpm = Math.max(0, Math.min(100, bike.rpm));

            if (input.wheelie && bike.speed > 20) {
                bike.wheelieAngle += 45 * dt;
            } else {
                bike.wheelieAngle *= 0.85;
            }
            bike.wheelieAngle = Math.max(0, Math.min(45, bike.wheelieAngle));

            // 🔧 SAĞ-SOL: BIRAKINCA ORTAYA DÖNMEZ!
            if (input.steerLeft) {
                bike.lateralPos -= 6 * dt;
                bike.leanAngle = Math.max(-25, bike.leanAngle - 50 * dt);
            } else if (input.steerRight) {
                bike.lateralPos += 6 * dt;
                bike.leanAngle = Math.min(25, bike.leanAngle + 50 * dt);
            } else {
                bike.leanAngle *= 0.9;
                // lateralPos *= 0.92; ← BU SATIR SİLİNDİ! Artık ortaya dönmez!
            }
            bike.lateralPos = Math.max(-3.5, Math.min(3.5, bike.lateralPos));

            const dist = (Math.abs(bike.speed) / 3.6) * dt;
            totalDist += dist;
            saveCounter += dist;
            money += dist * 0.05;

            if (saveCounter > 50) { saveProgress(); saveCounter = 0; }

            updateEngineSound(Math.abs(bike.speed), bike.rpm);

            if (bike.rpm > 70 && Math.abs(bike.speed) > 50 && Math.random() < dt * 2) {
                playExhaustPop();
            }
        }

        function updateHUD() {
            document.getElementById('speed-display').textContent = Math.floor(Math.abs(bike.speed));
            document.getElementById('gear-display').textContent = bike.speed < 0 ? 'R' : (bike.gear === 0 ? 'N' : bike.gear);
            const rpmFill = document.getElementById('rpm-fill');
            rpmFill.style.width = bike.rpm + '%';
            if (bike.rpm > 90) rpmFill.style.background = '#ff0000';
            else if (bike.rpm > 70) rpmFill.style.background = 'linear-gradient(90deg, #ffd700, #ff4d00)';
            else rpmFill.style.background = 'linear-gradient(90deg, #00ff88, #ffd700)';
            updateMoney();
        }

        // ============ OYUN DÖNGÜSÜ ============
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            updatePhysics(dt);
            updateHUD();

            const moveSpeed = bike.speed * dt * 0.5;
            segments.forEach((seg, i) => {
                seg.position.z += moveSpeed;
                if (seg.position.z > segLen) {
                    seg.position.z -= totalSegs * segLen;
                }
                if (seg.position.z < -segLen * (totalSegs - 1)) {
                    seg.position.z += totalSegs * segLen;
                }
            });

            bikeGroup.position.x = bike.lateralPos;
            bikeGroup.position.z = 0;
            bikeGroup.rotation.x = -bike.wheelieAngle * (Math.PI / 180);
            bikeGroup.rotation.z = -bike.leanAngle * (Math.PI / 180);
            bikeGroup.position.y = bike.wheelieAngle * 0.015;

            const wheelRot = bike.speed * dt * 0.5;
            frontWheel.children[0].rotation.x += wheelRot;
            rearWheel.children[0].rotation.x += wheelRot;

            // 📷 KAMERA DÜZELTİLDİ
            const targetCamX = bike.lateralPos * 0.4;
            const targetCamY = 3.5 + Math.abs(bike.speed) * 0.008;
            const targetCamZ = -5 - Math.abs(bike.speed) * 0.02;
            camera.position.x += (targetCamX - camera.position.x) * 3 * dt;
            camera.position.y += (targetCamY - camera.position.y) * 3 * dt;
            camera.position.z += (targetCamZ - camera.position.z) * 3 * dt;
            camera.lookAt(bike.lateralPos * 0.6, 1.2 + bike.wheelieAngle * 0.02, 10);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('beforeunload', () => { saveProgress(); stopEngineSound(); });

        document.addEventListener('click', () => { initAudio(); }, { once: true });
        document.addEventListener('touchstart', () => { initAudio(); }, { once: true });

        updateHUD();
        animate();
        console.log('🏍️ Hazır! Renk:', bikeColor, '| Sağ-sol sabit | Kamera düzeltildi');
    </script>
</body>
</html>
