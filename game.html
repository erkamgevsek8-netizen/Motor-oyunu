<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; overflow: hidden;
            height: 100vh; width: 100vw;
            font-family: Arial;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .speed-hud {
            position: fixed; bottom: 25px; left: 15px; z-index: 10;
            font-size: 45px; font-weight: 900; color: #ff4d00;
            text-shadow: 0 0 10px rgba(255,77,0,0.5);
            pointer-events: none;
        }
        .gear-hud {
            position: fixed; bottom: 30px; left: 100px; z-index: 10;
            font-size: 24px; font-weight: 900; color: #ffd700;
            background: rgba(0,0,0,0.7); padding: 5px 12px;
            border-radius: 10px; pointer-events: none;
        }
        .money-hud {
            position: fixed; top: 15px; right: 15px; z-index: 10;
            font-size: 15px; color: #ffd700;
            background: rgba(0,0,0,0.7); padding: 6px 14px;
            border-radius: 20px; pointer-events: none;
        }
        .back-btn {
            position: fixed; top: 12px; left: 12px; z-index: 20;
            background: rgba(0,0,0,0.7); border-radius: 50%;
            width: 38px; height: 38px; display: flex;
            align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-size: 18px;
        }
        .controls {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            display: flex; gap: 30px;
        }
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            font-size: 28px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; color: #fff;
        }
        .btn-gas {
            background: rgba(0,180,0,0.4); border-color: #0f0;
        }
        .btn-brake {
            background: rgba(180,0,0,0.4); border-color: #f00;
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <a href="index.html" class="back-btn">←</a>
    <div class="speed-hud" id="spd">0</div>
    <div class="gear-hud" id="gear">N</div>
    <div class="money-hud">🪙 <span id="money">0</span></div>

    <div class="controls">
        <button class="btn btn-brake" id="brake-btn">🔽</button>
        <button class="btn btn-gas" id="gas-btn">🔼</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // THREE.js r128 (import map'siz, direkt çalışır)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.Fog('#87CEEB', 40, 100);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 120);
        camera.position.set(0, 4, -6);
        camera.lookAt(0, 1, 8);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Işık
        scene.add(new THREE.AmbientLight('#ffffff', 0.7));
        const sun = new THREE.DirectionalLight('#ffffff', 1.5);
        sun.position.set(10, 20, 5);
        scene.add(sun);

        // MOTOR
        const bike = new THREE.Group();
        const red = new THREE.MeshStandardMaterial({ color: '#ff3300', roughness: 0.2, metalness: 0.7 });
        const gray = new THREE.MeshStandardMaterial({ color: '#444', roughness: 0.3 });
        const black = new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.8 });
        const chrome = new THREE.MeshStandardMaterial({ color: '#ccc', roughness: 0.1, metalness: 1 });

        // Gövde
        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 1.7), red).position.set(0, 0.7, 0));
        // Depo
        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.23, 0.65, 8), red).rotation.set(Math.PI/2,0,0).position.set(0, 0.95, 0.25));
        // Sele
        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.5), black).position.set(0, 0.95, -0.45));
        // Motor
        bike.add(new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.5), gray).position.set(0, 0.5, -0.05));
        // Far
        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.06, 8), new THREE.MeshStandardMaterial({ color: '#fff', emissive: '#fff', emissiveIntensity: 0.5 })).rotation.set(Math.PI/2,0,0).position.set(0, 0.85, 0.98));
        // Ön teker
        const fw = new THREE.Group();
        fw.position.set(0, 0.15, 0.9);
        fw.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black));
        fw.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.08, 12), chrome).rotation.set(Math.PI/2,0,0));
        bike.add(fw);
        // Arka teker
        const rw = new THREE.Group();
        rw.position.set(0, 0.15, -0.75);
        rw.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.09, 8, 12), black));
        rw.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.08, 12), chrome).rotation.set(Math.PI/2,0,0));
        bike.add(rw);
        // Gidon
        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 6), chrome).rotation.set(0,0,Math.PI/2).position.set(0, 1.2, 0.8));
        // Egzoz
        bike.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.7, 6), chrome).position.set(0.18, 0.2, -0.8).rotation.set(-0.2,0,0));

        scene.add(bike);

        // YOL
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);
        const roadMat = new THREE.MeshStandardMaterial({ color: '#444' });
        const grassMat = new THREE.MeshStandardMaterial({ color: '#2d5a1e' });
        const segments = [];
        const SEG = 25;
        const COUNT = 5;

        for (let i = 0; i < COUNT; i++) {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(8, SEG), roadMat).rotation.set(-Math.PI/2,0,0).position.set(0,0,SEG/2));
            
            for (let z = 0; z < SEG; z += 4) {
                g.add(new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2), new THREE.MeshStandardMaterial({ color: '#fff' })).rotation.set(-Math.PI/2,0,0).position.set(0,0.01,z+2));
            }
            
            for (let s = -1; s <= 1; s += 2) {
                g.add(new THREE.Mesh(new THREE.PlaneGeometry(10, SEG), grassMat).rotation.set(-Math.PI/2,0,0).position.set(s*9,-0.05,SEG/2));
                // Ağaçlar
                for (let t = 0; t < 2; t++) {
                    const tree = new THREE.Group();
                    tree.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 2.5, 5), new THREE.MeshStandardMaterial({ color: '#5a3a1a' })).position.set(0,1.2,0));
                    tree.add(new THREE.Mesh(new THREE.ConeGeometry(1, 3, 6), new THREE.MeshStandardMaterial({ color: '#1a5a1a' })).position.set(0,3,0));
                    tree.position.set(s*(7+Math.random()*4), 0, Math.random()*SEG);
                    g.add(tree);
                }
            }
            
            g.position.z = -i * SEG;
            segments.push(g);
            roadGroup.add(g);
        }

        // OYUN
        let speed = 0;
        let gear = 0;
        let money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        let totalDist = parseFloat(localStorage.getItem('motorRiderDistance')) || 0;
        const gears = [0, 30, 55, 85, 120, 155, 200];

        let gasOn = false;
        let brakeOn = false;

        // Mobil butonlar
        document.getElementById('gas-btn').addEventListener('touchstart', (e) => { e.preventDefault(); gasOn = true; });
        document.getElementById('gas-btn').addEventListener('touchend', () => gasOn = false);
        document.getElementById('brake-btn').addEventListener('touchstart', (e) => { e.preventDefault(); brakeOn = true; });
        document.getElementById('brake-btn').addEventListener('touchend', () => brakeOn = false);

        // Klavye
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function getInput() {
            return {
                gas: gasOn || keys['w'] || keys['arrowup'] || false,
                brake: brakeOn || keys['s'] || keys['arrowdown'] || false
            };
        }

        let lastTime = performance.now();

        function loop() {
            requestAnimationFrame(loop);
            
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            const input = getInput();

            // Fizik
            if (input.gas && speed < 200) speed += 40 * dt;
            if (input.brake) {
                if (speed > 0) speed -= 60 * dt;
                else if (speed > -30) speed -= 25 * dt;
            }
            if (!input.gas && !input.brake) {
                if (speed > 0) speed -= 0.8 * dt;
                else if (speed < 0) speed += 0.8 * dt;
            }
            speed = Math.max(-30, Math.min(200, speed));
            if (Math.abs(speed) < 0.2) speed = 0;

            // Vites
            if (speed <= 0) gear = 0;
            else for (let g = 6; g >= 1; g--) if (speed >= gears[g-1]) { gear = g; break; }

            // Mesafe & Para
            const d = (Math.abs(speed) / 3.6) * dt;
            totalDist += d;
            money += d * 0.05;

            // HUD
            document.getElementById('spd').textContent = Math.floor(Math.abs(speed));
            document.getElementById('gear').textContent = speed < -0.5 ? 'R' : (gear === 0 ? 'N' : gear);
            document.getElementById('money').textContent = Math.floor(money).toLocaleString('tr-TR');

            // Yol
            const move = speed * dt * 0.5;
            segments.forEach(seg => {
                seg.position.z += move;
                if (seg.position.z > SEG) seg.position.z -= COUNT * SEG;
                if (seg.position.z < -COUNT * SEG) seg.position.z += COUNT * SEG;
            });

            // Tekerlek
            fw.children[0].rotation.x += speed * dt * 0.5;
            rw.children[0].rotation.x += speed * dt * 0.5;

            // Kamera
            camera.position.z = -6 - Math.abs(speed) * 0.01;
            camera.position.y = 4 + Math.abs(speed) * 0.005;
            camera.lookAt(0, 1, 8);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Kaydet
        setInterval(() => {
            localStorage.setItem('motorRiderMoney', Math.floor(money));
            localStorage.setItem('motorRiderDistance', totalDist);
        }, 3000);

        lastTime = performance.now();
        loop();
    </script>
</body>
</html>
