<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider</title>
    
    <!-- CSS burada -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                transparent 50%,
                rgba(0, 0, 0, 0.7) 80%,
                rgba(0, 0, 0, 0.95) 100%
            );
            z-index: 2;
            pointer-events: none;
        }

        .game-title {
            position: fixed;
            top: 40px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }

        .game-title h1 {
            font-size: clamp(36px, 7vw, 64px);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255, 77, 0, 0.6), 0 4px 8px rgba(0,0,0,0.8);
        }

        .game-title .subtitle {
            font-size: clamp(14px, 2.5vw, 20px);
            color: #ff4d00;
            letter-spacing: 8px;
            font-weight: 300;
            margin-top: 5px;
            text-shadow: 0 0 20px rgba(255, 77, 0, 0.8);
        }

        .menu-buttons {
            position: fixed;
            right: 30px;
            bottom: 60px;
            z-index: 10;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-end;
            gap: 12px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 77, 0, 0.4);
            border-radius: 50px;
            padding: 14px 28px;
            cursor: pointer;
            transition: all 0.35s;
            color: #ffffff;
            font-size: clamp(15px, 2.5vw, 19px);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            min-width: 160px;
            text-decoration: none;
        }

        .menu-btn:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: #ff4d00;
            transform: translateX(-8px) scale(1.03);
            box-shadow: 0 10px 40px rgba(255, 77, 0, 0.3);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .menu-btn .icon {
            font-size: clamp(20px, 3vw, 26px);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 77, 0, 0.2);
            border-radius: 50%;
        }

        .menu-btn.main-btn {
            padding: 18px 35px;
            border-color: #ff4d00;
            box-shadow: 0 0 30px rgba(255, 77, 0, 0.4);
            animation: pulse-btn 2.5s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 77, 0, 0.4); }
            50% { box-shadow: 0 0 60px rgba(255, 77, 0, 0.7); }
        }

        .menu-btn.main-btn .icon {
            background: #ff4d00;
            color: #000;
            font-size: 28px;
        }

        .speed-display {
            position: fixed;
            left: 30px;
            bottom: 60px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.4;
        }

        .speed-display .speed-number {
            font-size: clamp(50px, 10vw, 90px);
            font-weight: 900;
            color: #ff4d00;
            line-height: 1;
        }

        .speed-display .speed-unit {
            font-size: clamp(14px, 2vw, 18px);
            color: #cccccc;
            letter-spacing: 2px;
        }

        .version {
            position: fixed;
            left: 30px;
            top: 130px;
            z-index: 10;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .menu-buttons {
                right: 15px;
                bottom: 40px;
                gap: 8px;
            }
            .menu-btn {
                padding: 12px 22px;
                min-width: 130px;
                font-size: 14px;
            }
            .menu-btn.main-btn {
                padding: 15px 28px;
            }
            .game-title {
                top: 25px;
                left: 20px;
            }
        }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>
    <div class="overlay"></div>

    <div class="game-title">
        <h1>MOTOR<br>RIDER</h1>
        <div class="subtitle">HIGHWAY LEGENDS</div>
    </div>

    <div class="version">v1.0 BETA</div>

    <div class="speed-display">
        <div class="speed-number">220</div>
        <div class="speed-unit">KM/H MAX</div>
    </div>

    <div class="menu-buttons">
        <a href="game.html" class="menu-btn main-btn">
            <span class="icon">▶</span>
            BAŞLA
        </a>
        <a href="garage.html" class="menu-btn">
            <span class="icon">🔧</span>
            GARAJ
        </a>
        <a href="settings.html" class="menu-btn">
            <span class="icon">⚙️</span>
            AYARLAR
        </a>
    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <!-- JavaScript burada -->
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a0a');
        scene.fog = new THREE.Fog('#0a0a0a', 5, 25);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 50);
        camera.position.set(3.5, 1.8, 5);
        camera.lookAt(0, 0.8, 0);

        // Işıklar
        const keyLight = new THREE.DirectionalLight('#ff9966', 4);
        keyLight.position.set(5, 8, 3);
        scene.add(keyLight);
        
        const fillLight = new THREE.DirectionalLight('#4488ff', 1.5);
        fillLight.position.set(-3, 2, -2);
        scene.add(fillLight);
        
        scene.add(new THREE.AmbientLight('#1a1a2e', 0.6));

        // Zemin
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.4, metalness: 0.3 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1.5;
        scene.add(ground);

        // MOTOR MODELİ
        const bikeGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.2, metalness: 0.9 });
        const redMat = new THREE.MeshStandardMaterial({ color: '#ff3300', roughness: 0.15, metalness: 0.8 });
        const chromeMat = new THREE.MeshStandardMaterial({ color: '#cccccc', roughness: 0.1, metalness: 1.0 });
        const tireMat = new THREE.MeshStandardMaterial({ color: '#111111', roughness: 0.9, metalness: 0.1 });
        const glassMat = new THREE.MeshStandardMaterial({ color: '#ffaa00', roughness: 0.2, metalness: 0.1, emissive: '#331100', emissiveIntensity: 0.5 });

        // Şasi
        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.8), bodyMat);
        frame.position.y = 0.7;
        bikeGroup.add(frame);

        // Motor
        const engine = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.6), chromeMat);
        engine.position.set(0, 0.55, -0.1);
        bikeGroup.add(engine);

        // Depo
        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.7, 16), redMat);
        tank.rotation.x = Math.PI / 2;
        tank.position.set(0, 0.9, 0.3);
        bikeGroup.add(tank);

        // Sele
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.15, 0.6), new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.8 }));
        seat.position.set(0, 0.95, -0.5);
        bikeGroup.add(seat);

        // Far
        const headlight = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.08, 16), glassMat);
        headlight.rotation.x = Math.PI / 2;
        headlight.position.set(0, 0.9, 1.05);
        bikeGroup.add(headlight);

        // Ön tekerlek
        const frontWheel = new THREE.Group();
        frontWheel.position.set(0, 0.15, 0.95);
        frontWheel.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.08, 16, 32), tireMat));
        const fRim = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 24), chromeMat);
        fRim.rotation.x = Math.PI / 2;
        frontWheel.add(fRim);
        bikeGroup.add(frontWheel);

        // Arka tekerlek
        const rearWheel = new THREE.Group();
        rearWheel.position.set(0, 0.15, -0.8);
        rearWheel.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.08, 16, 32), tireMat));
        const rRim = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 24), chromeMat);
        rRim.rotation.x = Math.PI / 2;
        rearWheel.add(rRim);
        bikeGroup.add(rearWheel);

        // Egzoz
        const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.8, 8), chromeMat);
        exhaust.position.set(0.2, 0.3, -0.9);
        exhaust.rotation.x = -0.3;
        bikeGroup.add(exhaust);

        const exhaustTip = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.1, 8), redMat);
        exhaustTip.position.set(0.2, -0.05, -1.25);
        bikeGroup.add(exhaustTip);

        scene.add(bikeGroup);

        // Animasyon
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            
            bikeGroup.rotation.y = Math.sin(t * 0.4) * 0.3;
            bikeGroup.position.y = Math.sin(t * 1.5) * 0.08;
            frontWheel.rotation.x += 0.02;
            rearWheel.rotation.x += 0.02;
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🏍️ Ana menü hazır!');
    </script>
</body>
</html>
