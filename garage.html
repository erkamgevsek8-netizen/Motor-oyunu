<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motor Rider - Garaj</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff4d00; --text: #ffffff; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0a0a0a; overflow-x: hidden; overflow-y: auto;
            min-height: 100vh; color: var(--text);
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #garage-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 2; pointer-events: none;
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 20;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 20px; text-decoration: none; transition: all 0.3s;
        }
        .back-btn:hover { border-color: #ff4d00; box-shadow: 0 0 20px rgba(255,77,0,0.3); }
        .money-bar {
            position: fixed; top: 20px; right: 20px; z-index: 20;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,215,0,0.4); border-radius: 30px;
            padding: 12px 22px; display: flex; align-items: center; gap: 10px;
            color: #ffd700; font-weight: 700; font-size: clamp(16px, 2.5vw, 20px);
        }
        .garage-title {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 20;
            pointer-events: none; font-size: clamp(22px, 4vw, 34px); font-weight: 900;
            letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 25px rgba(255,77,0,0.5); text-align: center;
        }
        .mod-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center; max-width: 95vw;
        }
        .mod-btn {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 18px;
            padding: 14px 16px; cursor: pointer; transition: all 0.3s;
            color: #fff; font-size: clamp(11px, 1.6vw, 14px); font-weight: 700;
            letter-spacing: 1px; text-align: center; min-width: 75px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .mod-btn:hover { border-color: #ff4d00; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,77,0,0.3); }
        .mod-btn:active { transform: scale(0.93); }
        .mod-btn .mod-icon { font-size: clamp(22px, 2.5vw, 30px); }
        .mod-btn .mod-price { font-size: 10px; color: #ffd700; margin-top: 2px; }
        .mod-btn.owned { border-color: #00ff88 !important; }
        .mod-btn.owned .mod-price { color: #00ff88; }
        .mod-btn.equipped { border-color: #ffd700 !important; box-shadow: 0 0 20px rgba(255,215,0,0.4); animation: glow 2s infinite; }
        @keyframes glow { 0%,100%{box-shadow:0 0 15px rgba(255,215,0,0.3);} 50%{box-shadow:0 0 35px rgba(255,215,0,0.6);} }
        .exhaust-btn {
            position: fixed; bottom: 155px; left: 50%; transform: translateX(-50%); z-index: 20;
            background: rgba(255,77,0,0.3); border: 2px solid #ff4d00; border-radius: 40px;
            padding: 14px 30px; cursor: pointer; color: #fff; font-size: 17px; font-weight: 900;
            letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s;
        }
        .exhaust-btn:hover { background: rgba(255,77,0,0.5); box-shadow: 0 0 40px rgba(255,77,0,0.6); transform: translateX(-50%) scale(1.05); }
        .flame-particle {
            position: fixed; width: 15px; height: 15px; border-radius: 50%;
            pointer-events: none; z-index: 5;
            animation: flameBurst 0.8s ease-out forwards;
        }
        @keyframes flameBurst { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;} }
        @media (max-width:600px) {
            .mod-panel { gap: 6px; bottom: 15px; }
            .mod-btn { padding: 10px 12px; min-width: 60px; border-radius: 14px; }
            .exhaust-btn { bottom: 135px; padding: 12px 22px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <canvas id="garage-canvas"></canvas>
    <div class="overlay"></div>
    <a href="index.html" class="back-btn">←</a>
    <div class="garage-title">🔧 GARAJ</div>
    <div class="money-bar"><span>🪙</span> <span id="garage-money">0</span></div>
    <button class="exhaust-btn" onclick="blastExhaust()">💥 Egzoz Patlat</button>
    <div class="mod-panel" id="mod-panel"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let money = parseInt(localStorage.getItem('motorRiderMoney')) || 0;
        document.getElementById('garage-money').textContent = money.toLocaleString('tr-TR');

        const canvas = document.getElementById('garage-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#111111');
        scene.fog = new THREE.Fog('#111111', 5, 20);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.3, 40);
        camera.position.set(2.5, 1.8, 4.5);
        camera.lookAt(0, 0.8, 0);

        const keyLight = new THREE.DirectionalLight('#ffffff', 4);
        keyLight.position.set(5, 6, 3);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        scene.add(keyLight);
        scene.add(new THREE.DirectionalLight('#4488cc', 2).position.set(-3, 2, -2));
        scene.add(new THREE.DirectionalLight('#ff4400', 2.5).position.set(0, 0.5, -4));
        scene.add(new THREE.AmbientLight('#222233', 0.6));

        const floor = new THREE.Mesh(new THREE.CircleGeometry(6, 48), new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.3, metalness: 0.5 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = -1.5; floor.receiveShadow = true; scene.add(floor);

        const platform = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.5, 0.08, 32), new THREE.MeshStandardMaterial({ color: '#2a2a2a', roughness: 0.2, metalness: 0.7 }));
        platform.position.y = -1.46; platform.receiveShadow = true; scene.add(platform);

        const bikeGroup = new THREE.Group();
        const bodyParts = {};
        const chromeMat = new THREE.MeshStandardMaterial({ color: '#cccccc', roughness: 0.1, metalness: 1.0 });
        const tireMat = new THREE.MeshStandardMaterial({ color: '#111111', roughness: 0.9, metalness: 0.05 });
        const seatMat = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.8, metalness: 0.1 });

        const currentColor = localStorage.getItem('motorRiderBikeColor') || '#ff3300';
        let bodyMat = new THREE.MeshStandardMaterial({ color: currentColor, roughness: 0.15, metalness: 0.8 });

        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 1.6), bodyMat);
        frame.position.y = 0.75; frame.castShadow = true; bodyParts['frame'] = frame; bikeGroup.add(frame);

        const engine = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.42, 0.55), chromeMat);
        engine.position.set(0, 0.5, -0.05); engine.castShadow = true; bikeGroup.add(engine);

        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.7, 16), bodyMat);
        tank.rotation.x = Math.PI / 2; tank.position.set(0, 0.9, 0.3); tank.castShadow = true;
        bodyParts['tank'] = tank; bikeGroup.add(tank);

        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.15, 0.6), seatMat);
        seat.position.set(0, 0.95, -0.5); seat.castShadow = true; bikeGroup.add(seat);

        const headlight = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.08, 16), new THREE.MeshStandardMaterial({ color: '#fff', roughness: 0.1, emissive: '#fff', emissiveIntensity: 0.9 }));
        headlight.rotation.x = Math.PI / 2; headlight.position.set(0, 0.9, 1.05); bikeGroup.add(headlight);

        const frontWheelGroup = new THREE.Group();
        frontWheelGroup.position.set(0, 0.15, 0.95);
        frontWheelGroup.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.08, 16, 32), tireMat));
        const fRim = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 24), chromeMat);
        fRim.rotation.x = Math.PI / 2; frontWheelGroup.add(fRim); bikeGroup.add(frontWheelGroup);

        const rearWheelGroup = new THREE.Group();
        rearWheelGroup.position.set(0, 0.15, -0.8);
        rearWheelGroup.add(new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.08, 16, 32), tireMat));
        const rRim = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 24), chromeMat);
        rRim.rotation.x = Math.PI / 2; rearWheelGroup.add(rRim); bikeGroup.add(rearWheelGroup);

        const exhaustGroup = new THREE.Group();
        exhaustGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.9, 8), chromeMat).position.set(0.2, 0.25, -0.5));
        exhaustGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.09, 0.45), chromeMat).position.set(0.2, 0.06, -1.0));
        const exhaustTip = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.08, 8), bodyMat);
        exhaustTip.position.set(0.2, 0.06, -1.25); bodyParts['exhaustTip'] = exhaustTip; exhaustGroup.add(exhaustTip);
        bikeGroup.add(exhaustGroup);

        const handlebar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 8), chromeMat);
        handlebar.rotation.z = Math.PI / 2; handlebar.position.set(0, 1.3, 0.85); bikeGroup.add(handlebar);

        scene.add(bikeGroup);

        const flameGroup = new THREE.Group();
        flameGroup.visible = false; scene.add(flameGroup);
        let flameParticles = [];

        function createFlameBurst() {
            while (flameGroup.children.length > 0) flameGroup.remove(flameGroup.children[0]);
            flameParticles = [];
            for (let i = 0; i < 50; i++) {
                const f = new THREE.Mesh(new THREE.SphereGeometry(Math.random() * 0.08 + 0.03, 4, 4), new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? '#ff4400' : '#ffaa00', transparent: true, opacity: 1 }));
                f.position.set(0.2 + (Math.random() - 0.5) * 0.1, 0.06 + (Math.random() - 0.5) * 0.05, -1.3);
                flameParticles.push({ mesh: f, vel: new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 3 + 1, -Math.random() * 5 - 3), life: 0.6 + Math.random() * 0.5, age: 0 });
                flameGroup.add(f);
            }
            flameGroup.visible = true;
        }

        function updateFlames(dt) {
            for (let i = flameParticles.length - 1; i >= 0; i--) {
                const p = flameParticles[i];
                p.age += dt;
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.mesh.material.opacity = 1 - (p.age / p.life);
                p.mesh.scale.setScalar(1 - (p.age / p.life) * 0.7);
                if (p.age >= p.life) { flameGroup.remove(p.mesh); flameParticles.splice(i, 1); }
            }
            if (flameParticles.length === 0) flameGroup.visible = false;
        }

        let audioContext = null;
        function getAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        function playExhaustSound() {
            try {
                const ctx = getAudioContext();
                const duration = 0.5, sr = ctx.sampleRate;
                const buf = ctx.createBuffer(1, duration * sr, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) {
                    const t = i / sr, noise = Math.random() * 2 - 1;
                    const env = Math.exp(-t * 8), bass = Math.sin(2 * Math.PI * 80 * t) * env;
                    d[i] = (noise * 0.4 + bass * 0.6) * env * 0.7;
                }
                const src = ctx.createBufferSource(); src.buffer = buf;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.8, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                src.connect(g); g.connect(ctx.destination); src.start();

                setTimeout(() => {
                    const b2 = ctx.createBuffer(1, 0.3 * sr, sr);
                    const d2 = b2.getChannelData(0);
                    for (let i = 0; i < d2.length; i++) {
                        const t = i / sr;
                        d2[i] = (Math.random() * 2 - 1) * Math.exp(-t * 10) * 0.5;
                    }
                    const s2 = ctx.createBufferSource(); s2.buffer = b2;
                    const g2 = ctx.createGain();
                    g2.gain.setValueAtTime(0.5, ctx.currentTime);
                    g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    s2.connect(g2); g2.connect(ctx.destination); s2.start();
                }, 100);
            } catch (e) { console.log('Ses hatası:', e); }
        }

        window.blastExhaust = function() {
            createFlameBurst(); playExhaustSound();
            document.body.style.transform = 'translateX(3px)';
            setTimeout(() => document.body.style.transform = 'translateX(-3px)', 50);
            setTimeout(() => document.body.style.transform = 'translateX(0)', 100);
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div'); p.className = 'flame-particle';
                p.style.cssText = `left:52%;top:58%;background:${Math.random()>0.5?'#ff4400':'#ffaa00'};width:${Math.random()*12+6}px;height:${Math.random()*12+6}px;--dx:${(Math.random()-0.5)*200}px;--dy:${-(Math.random()*150+50)}px;box-shadow:0 0 ${Math.random()*15+5}px currentColor;`;
                document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            }
            if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 30]);
            console.log('💥 Egzoz patladı!');
        };

        const clock = new THREE.Clock();
        let isDragging = false, prevMouseX = 0, rotationY = 0;

        canvas.addEventListener('mousedown', e => { isDragging = true; prevMouseX = e.clientX; });
        canvas.addEventListener('mousemove', e => { if (isDragging) { rotationY += (e.clientX - prevMouseX) * 0.01; prevMouseX = e.clientX; } });
        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);
        canvas.addEventListener('touchstart', e => { if (e.touches.length === 1) { isDragging = true; prevMouseX = e.touches[0].clientX; } });
        canvas.addEventListener('touchmove', e => { if (isDragging && e.touches.length === 1) { rotationY += (e.touches[0].clientX - prevMouseX) * 0.01; prevMouseX = e.touches[0].clientX; } });
        canvas.addEventListener('touchend', () => isDragging = false);

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            if (!isDragging) rotationY += 0.003;
            bikeGroup.rotation.y = rotationY;
            bikeGroup.position.y = Math.sin(Date.now() * 0.001) * 0.05;
            updateFlames(dt);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function changeColor(color) {
            const m = new THREE.MeshStandardMaterial({ color, roughness: 0.15, metalness: 0.8 });
            bodyParts['frame'].material = m; bodyParts['tank'].material = m;
            bodyParts['exhaustTip'].material = m; bodyMat = m;
        }

        const mods = [
            { id: 'color_red', name: 'Kırmızı', icon: '🔴', price: 200, color: '#ff3300', category: 'renk' },
            { id: 'color_blue', name: 'Mavi', icon: '🔵', price: 200, color: '#0066ff', category: 'renk' },
            { id: 'color_green', name: 'Yeşil', icon: '🟢', price: 200, color: '#00cc44', category: 'renk' },
            { id: 'color_black', name: 'Siyah', icon: '⚫', price: 200, color: '#1a1a1a', category: 'renk' },
            { id: 'color_white', name: 'Beyaz', icon: '⚪', price: 200, color: '#f0f0f0', category: 'renk' },
            { id: 'color_gold', name: 'Altın', icon: '🟡', price: 200, color: '#d4a017', category: 'renk' },
            { id: 'exhaust_sport', name: 'Sport Egzoz', icon: '💨', price: 50, category: 'egzoz' },
            { id: 'exhaust_race', name: 'Yarış Egzoz', icon: '🔥', price: 50, category: 'egzoz' },
            { id: 'rim_chrome', name: 'Krom Jant', icon: '✨', price: 200, category: 'jant' },
            { id: 'rim_black', name: 'Siyah Jant', icon: '🖤', price: 200, category: 'jant' },
        ];

        const ownedMods = JSON.parse(localStorage.getItem('motorRiderOwnedMods')) || ['color_red'];
        const equippedMods = JSON.parse(localStorage.getItem('motorRiderEquippedMods')) || { color: 'color_red' };

        function buildModPanel() {
            const panel = document.getElementById('mod-panel');
            panel.innerHTML = '';
            mods.forEach(mod => {
                const btn = document.createElement('button');
                btn.className = 'mod-btn';
                if (equippedMods[mod.category] === mod.id) btn.classList.add('equipped');
                if (ownedMods.includes(mod.id)) btn.classList.add('owned');
                btn.innerHTML = `<span class="mod-icon">${mod.icon}</span><span>${mod.name}</span><span class="mod-price">${ownedMods.includes(mod.id) ? '✅ Sahip' : '🪙 ' + mod.price}</span>`;
                btn.onclick = () => {
                    if (ownedMods.includes(mod.id)) {
                        equippedMods[mod.category] = mod.id;
                        localStorage.setItem('motorRiderEquippedMods', JSON.stringify(equippedMods));
                        if (mod.category === 'renk') { changeColor(mod.color); localStorage.setItem('motorRiderBikeColor', mod.color); }
                        buildModPanel();
                    } else {
                        if (money >= mod.price) {
                            money -= mod.price;
                            ownedMods.push(mod.id);
                            localStorage.setItem('motorRiderMoney', money);
                            localStorage.setItem('motorRiderOwnedMods', JSON.stringify(ownedMods));
                            document.getElementById('garage-money').textContent = money.toLocaleString('tr-TR');
                            buildModPanel();
                        } else {
                            alert('❌ Yetersiz bakiye!\nGerekli: 🪙 ' + mod.price + '\nSenin: 🪙 ' + money.toLocaleString('tr-TR'));
                        }
                    }
                };
                panel.appendChild(btn);
            });
        }

        changeColor(currentColor);
        buildModPanel();
        console.log('🔧 Garaj hazır! 💰 Para:', money.toLocaleString('tr-TR'));
    </script>
</body>
</html>
