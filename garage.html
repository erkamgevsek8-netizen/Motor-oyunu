<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Rider - Garaj</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            color: #ffffff;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20,20,20,0.85);
            border: 2px solid rgba(255,77,0,0.4);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: #ff4d00;
            box-shadow: 0 0 20px rgba(255,77,0,0.3);
        }
        h1 {
            font-size: clamp(24px, 5vw, 40px);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255,77,0,0.5);
        }
        p { color: #888; font-size: 18px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">←</a>
    <h1>🔧 GARAJ</h1>
    <p>🚧 Garaj yapım aşamasında...</p>
    <p style="font-size:14px;">Motor modifiye ve egzoz efektleri yakında!</p>
</body>
</html>
